<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ERONIX Dealer OS · City Order Desk</title>
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#0a0a0b" />
<meta name="color-scheme" content="dark" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Order Desk" />
<link rel="icon" href="/icons/favicon-64.png" />
<style>
/* ===== ERONIX Dealer OS — Light (Apple system palette) ===== */
:root{--bg:#f5f5f7;--surface:#ffffff;--surface2:#f2f2f7;--label:#1d1d1f;--label2:rgba(60,60,67,.6);--label3:rgba(60,60,67,.45);--label4:rgba(60,60,67,.3);
 --sep:rgba(60,60,67,.16);--sep2:rgba(60,60,67,.09);--blue:#007AFF;
 --green:#34C759;--amber:#FF9500;--yellow:#FFCC00;--red:#FF3B30;--purple:#AF52DE;--teal:#30B0C7;
 --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Helvetica Neue",sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--label);font-family:var(--font);letter-spacing:-.014em;line-height:1.5;}
a,button{color:inherit;text-decoration:none;font-family:inherit;}
button{cursor:pointer;border:none;background:none}
::selection{background:rgba(0,122,255,.25)}

.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh;min-height:100svh;}
.side{position:sticky;top:0;height:100vh;height:100svh;border-right:.5px solid var(--sep);padding:26px 18px;display:flex;flex-direction:column;background:#ffffff;}
.side .logo{font-weight:800;letter-spacing:.16em;font-size:16px;margin:4px 8px 4px;}
.side .logo .os{display:block;font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--label3);margin-top:3px;}
.nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--label4);font-weight:600;padding:0 13px;margin:24px 0 8px;}
.nav-section-label:first-of-type{margin-top:30px}
.nav{display:flex;flex-direction:column;gap:3px;}
.nav a{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;font-size:14px;font-weight:500;color:var(--label2);transition:background .2s,color .2s;cursor:pointer;}
.nav a:hover{color:var(--label);background:rgba(0,0,0,.05);}
.nav a.on{color:var(--blue);background:rgba(0,122,255,.1);}
.nav a svg{width:17px;height:17px;flex:none;opacity:.9;}
.nav a span.tx{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav a .ct{font-size:11px;font-weight:600;color:var(--label3);background:rgba(120,120,128,.16);padding:1px 8px;border-radius:999px;min-width:22px;text-align:center}
.nav a.on .ct{color:var(--blue);background:rgba(0,122,255,.16)}
.side .who{margin-top:auto;padding:13px;border-radius:13px;background:rgba(0,0,0,.035);border:.5px solid var(--sep2);}
.side .who .top{display:flex;align-items:center;gap:10px}
.side .who .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;color:#fff;background:linear-gradient(135deg,var(--blue),#0a64c8);flex:none}
.side .who .av.wh{background:linear-gradient(135deg,var(--purple),#8e3bbf)}
.side .who .nm{font-size:13px;font-weight:600;}
.side .who .gs{font-size:11px;color:var(--label3);margin-top:1px;letter-spacing:.01em;}
.side .who .out{display:block;width:100%;margin-top:11px;padding:8px;border-radius:9px;font-size:12px;font-weight:600;color:var(--label2);background:rgba(0,0,0,.05);transition:.2s}
.side .who .out:hover{color:var(--label);background:rgba(120,120,128,.18)}

.main{padding:30px 40px 60px;min-width:0;}
.dos-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:26px;}
.dos-greeting{font-size:24px;font-weight:700;letter-spacing:-.02em;}
.dos-greeting-sub{font-size:13.5px;color:var(--label3);margin-top:4px;}
.head-right{display:flex;align-items:center;gap:10px}
.dos-territory-pill{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--label);background:var(--surface);border:.5px solid var(--sep);border-radius:999px;padding:9px 15px;cursor:pointer;transition:.2s;position:relative}
.dos-territory-pill:hover{border-color:rgba(0,0,0,.18)}
.dos-territory-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.dos-territory-pill .chev{color:var(--label3);font-size:9px}
.sim{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--label2);background:var(--surface);border:.5px dashed var(--sep);border-radius:999px;padding:9px 14px;transition:.2s}
.sim:hover{color:var(--teal);border-color:var(--teal)}
.citymenu{position:absolute;top:46px;right:0;background:var(--surface2);border:.5px solid var(--sep);border-radius:14px;padding:6px;min-width:200px;box-shadow:0 24px 60px rgba(0,0,0,.16);display:none;z-index:40}
.citymenu.open{display:block}
.citymenu button{display:flex;align-items:center;justify-content:space-between;width:100%;font-size:13px;font-weight:500;padding:10px 12px;border-radius:9px;color:var(--label2)}
.citymenu button:hover{background:rgba(120,120,128,.12);color:var(--label)}
.citymenu button.sel{color:var(--blue)}
.citymenu button .c{font-size:11px;color:var(--label3);background:rgba(120,120,128,.16);padding:2px 8px;border-radius:999px}
.citymenu button.sel .c{background:rgba(0,122,255,.22);color:var(--teal)}

.dos-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:26px;}
.dos-stat-cell{background:var(--surface);border:.5px solid var(--sep);border-radius:18px;padding:16px 18px;}
.dos-stat-label{font-size:12px;color:var(--label3);display:flex;align-items:center;gap:7px}
.dos-stat-label .sw{width:7px;height:7px;border-radius:2px}
.dos-stat-val{font-size:27px;font-weight:700;margin-top:8px;letter-spacing:-.02em;line-height:1}

.card{background:var(--surface);border:.5px solid var(--sep);border-radius:20px;padding:20px;}
.dos-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:14px;flex-wrap:wrap}
.dos-card-title{font-size:15px;font-weight:650;letter-spacing:-.01em}
.dos-card-sub{font-size:12.5px;color:var(--label3)}
.fbar{display:flex;gap:7px;flex-wrap:wrap}
.fchip{font-size:12px;font-weight:600;color:var(--label2);padding:6px 12px;border-radius:999px;background:rgba(120,120,128,.12);transition:.18s}
.fchip:hover{color:var(--label)}
.fchip.on{color:#fff;background:var(--blue)}
.fchip .b{margin-left:6px;opacity:.75}

.qlist{margin-top:6px}
.qrow{display:grid;grid-template-columns:1fr auto;gap:6px 14px;padding:16px 4px;border-top:.5px solid var(--sep2);cursor:pointer;transition:.15s;align-items:center}
.qrow:first-child{border-top:none}
.qrow:hover{background:rgba(0,0,0,.03);border-radius:12px;padding-left:12px;padding-right:12px}
.qrow .dealer{font-size:15px;font-weight:600;letter-spacing:-.01em}
.qrow .amt{font-size:15px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.qrow .sub{font-size:12px;color:var(--label3);grid-column:1}
.qrow .right{grid-column:2;display:flex;align-items:center;gap:10px;justify-self:end}
.qrow .age{font-size:11.5px;color:var(--label4)}
.pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:7px;white-space:nowrap}
.p-NEW,.p-ACCOUNTS_REVIEW{background:rgba(0,122,255,.16);color:var(--teal)}
.p-HELD{background:rgba(255,149,0,.16);color:var(--amber)}
.p-REOPENED{background:rgba(255,149,0,.16);color:var(--amber)}
.p-REJECTED{background:rgba(255,59,48,.16);color:var(--red)}
.p-CREDIT_OK{background:rgba(52,199,89,.16);color:var(--green)}
.p-PICKING{background:rgba(175,82,222,.16);color:var(--purple)}
.p-SERIALIZED{background:rgba(255,204,0,.16);color:var(--yellow)}
.p-INVOICED{background:rgba(0,122,255,.16);color:var(--blue)}
.p-DISPATCHED{background:rgba(48,176,199,.16);color:var(--teal)}
.p-DELIVERED{background:rgba(13,124,72,.15);color:#0E7A4B}
.flag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px}
.flag.over{color:var(--red);background:rgba(255,59,48,.14)}
.flag.sn{color:var(--yellow);background:rgba(255,204,0,.14)}
.flag.rv{color:var(--amber);background:rgba(255,149,0,.14)}
.flag.att{max-width:none}
.flag.att.warn{color:#B25000;background:rgba(255,149,0,.16)}
.flag.att.bad{color:#C9241B;background:rgba(255,59,48,.15)}
.qrow.needs-att{box-shadow:inset 3px 0 0 var(--amber)}
#navMain a.att{color:#C9241B}
#navMain a.att.on{color:#fff;background:#C9241B}
#navMain a.att .ct{color:inherit}
.ewmeta{display:grid;grid-template-columns:1fr 1fr;gap:9px 18px;margin-top:12px}
.ewmeta>div{display:flex;flex-direction:column;gap:2px}
.ewmeta .l{font-size:11px;color:var(--label3)}
.ewmeta .v{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.ledger{width:100%;border-collapse:collapse;margin-top:6px}
.ledger th{text-align:left;font-size:11px;color:var(--label3);font-weight:600;padding:0 0 7px;border-bottom:.5px solid var(--sep)}
.ledger th.r,.ledger td.r{text-align:right;font-variant-numeric:tabular-nums}
.ledger td{padding:9px 0;border-bottom:.5px solid var(--sep);font-size:13px;vertical-align:top}
.ledger tfoot .grand td{font-weight:700;border-bottom:none;padding-top:11px}
.ledger .od{display:inline-block;font-size:10px;font-weight:700;color:var(--red);background:rgba(255,59,48,.12);padding:1px 6px;border-radius:6px;margin-left:5px}
.ledgerclear{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:rgba(52,199,89,.10);border:.5px solid rgba(52,199,89,.22);margin-top:6px}
.ledgerclear .lc-ic{width:30px;height:30px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none}
.ledgerclear .lc-t{font-size:13.5px;font-weight:700;color:#248A3D}
.ledgerclear .lc-s{font-size:12px;color:var(--label2)}
.podthumb{display:flex;align-items:center;gap:11px;margin-top:11px;padding:9px;border:.5px solid var(--sep);border-radius:12px;position:relative}
.podthumb img{width:48px;height:48px;object-fit:cover;border-radius:8px;flex:none;background:var(--surface2)}
.podthumb .podpdf{width:48px;height:48px;border-radius:8px;background:rgba(255,59,48,.12);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none}
.podthumb .podmeta{flex:1;min-width:0}
.podx{position:absolute;top:8px;right:8px;border:none;background:var(--surface2);width:22px;height:22px;border-radius:50%;cursor:pointer;color:var(--label2);font-size:12px;line-height:1}
.podlink{display:inline-block;margin-top:8px;font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;text-decoration:none}
.srcb{font-size:10.5px;font-weight:600;letter-spacing:.005em;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;color:var(--label3)}
.srcb::before{content:"";width:6px;height:6px;border-radius:50%;flex:none}
.srcb.fos::before{background:#0a84ff}.srcb.dealer::before{background:#34C759}
.qempty{padding:48px 8px;text-align:center;color:var(--label3);font-size:13.5px;line-height:1.6}

.scrim{position:fixed;inset:0;background:rgba(0,0,0,.28);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.28s;z-index:50}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;height:100svh;width:580px;max-width:94vw;background:#ffffff;border-left:.5px solid var(--sep);transform:translateX(100%);transition:transform .32s cubic-bezier(.22,.8,.22,1);z-index:55;overflow-y:auto;}
.drawer.open{transform:translateX(0)}
.dwrap{padding:24px 28px 40px}
.dclose{position:absolute;top:22px;right:24px;width:32px;height:32px;border-radius:50%;background:rgba(120,120,128,.16);display:flex;align-items:center;justify-content:center;color:var(--label2);font-size:15px;transition:.2s}
.dclose:hover{background:rgba(0,0,0,.09);color:var(--label)}
.dhead h1{font-size:21px;font-weight:700;letter-spacing:-.02em;padding-right:40px}
.dmeta{font-size:12.5px;color:var(--label3);margin-top:8px;display:flex;flex-wrap:wrap;gap:5px 14px}
.dmeta b{color:var(--label2);font-weight:600}
.dtotal{display:flex;align-items:baseline;gap:10px;margin:18px 0 6px}
.dtotal .v{font-size:28px;font-weight:750;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.dtotal .l{font-size:12px;color:var(--label3)}

.block{background:var(--surface);border:.5px solid var(--sep);border-radius:18px;padding:18px 20px;margin-top:16px}
.block h3{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--label3);margin-bottom:14px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:10px}
.block h3 .hint{text-transform:none;letter-spacing:0;font-weight:500;color:var(--label4);font-size:11px}

.credit{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.credit .l{font-size:11.5px;color:var(--label3);margin-bottom:5px}
.credit .v{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.meter{height:7px;background:rgba(0,0,0,.08);border-radius:999px;margin-top:15px;overflow:hidden}
.meter i{display:block;height:100%;border-radius:999px;transition:.5s}
.cnote{margin-top:12px;font-size:12.5px;display:flex;gap:8px;line-height:1.45}
.cnote.ok{color:var(--green)}.cnote.warn{color:var(--amber)}.cnote.bad{color:var(--red)}
.csrc{font-size:11px;color:var(--label4);margin-top:9px}

table{width:100%;border-collapse:collapse}
thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--label3);text-align:left;padding:0 0 10px;font-weight:600}
thead th.r,tbody td.r,tfoot td.r{text-align:right;font-variant-numeric:tabular-nums}
tbody td{padding:10px 0;border-top:.5px solid var(--sep2);font-size:13.5px}
tbody td .pn{font-weight:550}
tbody td .sku{font-size:11px;color:var(--label3)}
tfoot td{padding:10px 0 0;font-size:13px;color:var(--label3)}
tfoot td.r{font-weight:600;color:var(--label2)}
tfoot tr.grand td{border-top:.5px solid var(--sep);padding-top:12px;font-size:16px;font-weight:750;color:var(--label)}

/* ===== serial capture ===== */
.serline{padding:15px 0;border-top:.5px solid var(--sep2)}
.scanhint{font-size:11.5px;color:var(--teal);background:rgba(48,176,199,.08);border:.5px solid rgba(48,176,199,.18);border-radius:9px;padding:8px 11px;margin-bottom:6px;display:flex;align-items:center;gap:7px;line-height:1.35}
.zline{font-size:11.5px;color:var(--green);background:rgba(52,199,89,.08);border:.5px solid rgba(52,199,89,.2);border-radius:9px;padding:8px 11px;margin-bottom:8px;line-height:1.4;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ztoggle{margin-left:auto;font-size:10.5px;font-weight:700;letter-spacing:.03em;color:var(--label3);background:rgba(120,120,128,.16);border-radius:999px;padding:3px 10px}
.ztoggle.on{color:#04210d;background:var(--green)}
.zok{color:var(--green);font-weight:600}
.zwarn{color:var(--amber);font-weight:600}
.zsample{font-size:11px;color:var(--label3);margin-top:8px}
.zsample code{color:var(--teal);background:rgba(48,176,199,.1);border-radius:5px;padding:2px 7px;margin-left:4px;cursor:pointer;font-variant-numeric:tabular-nums}
.zsample code:hover{background:rgba(48,176,199,.2)}
.serline:first-of-type{border-top:none;padding-top:2px}
.serhead{display:flex;align-items:center;justify-content:space-between;gap:10px}
.serhead .nm{font-size:13.5px;font-weight:600}
.serhead .lm{font-size:11px;color:var(--label3);margin-top:1px}
.serprog{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;padding:4px 11px;border-radius:8px;background:rgba(120,120,128,.16);color:var(--label2);white-space:nowrap}
.serprog.done{background:rgba(52,199,89,.16);color:var(--green)}
.serbar{height:5px;background:rgba(0,0,0,.08);border-radius:999px;margin:11px 0;overflow:hidden}
.serbar i{display:block;height:100%;background:var(--purple);border-radius:999px;transition:.3s}
.serbar i.done{background:var(--green)}
.serscan{display:flex;gap:8px}
.serscan input{flex:1;background:var(--surface2);border:.5px solid var(--sep);border-radius:10px;padding:10px 12px;color:var(--label);font-size:13px;font-family:inherit;letter-spacing:.02em}
.serscan input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.18)}
.serscan .af{font-size:11.5px;font-weight:600;color:var(--label3);background:rgba(120,120,128,.12);border-radius:10px;padding:0 13px;white-space:nowrap;transition:.18s}
.serscan .af:hover{color:var(--teal)}
.rangefill{display:flex;gap:8px;margin-top:8px}
.rangefill input{flex:1;background:var(--surface2);border:.5px solid var(--sep);border-radius:10px;padding:9px 12px;color:var(--label2);font-size:12.5px;font-family:inherit;letter-spacing:.02em}
.rangefill input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.18)}
.rangefill .af{font-size:11.5px;font-weight:600;color:var(--label3);background:rgba(120,120,128,.12);border-radius:10px;padding:0 13px;white-space:nowrap;transition:.18s}
.rangefill .af:hover{color:var(--teal)}
.rfnote{font-size:11px;color:var(--label3);margin-top:5px;line-height:1.4}
.scancap{font-size:11px;color:var(--label3);margin-top:7px;line-height:1.4}
.discloseBtn{font-size:12.5px;font-weight:600;color:var(--blue);background:none;padding:6px 0;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.discloseBtn::after{content:'›';font-size:15px;line-height:1;transition:transform .2s;opacity:.8}
.discloseBtn.on::after{transform:rotate(90deg)}
.discloseBtn.sub{font-size:12px;color:var(--label2);font-weight:500;margin-top:8px}
.caphelp{background:var(--surface2);border:.5px solid var(--sep);border-radius:14px;padding:12px 15px;margin:12px 0}
.caphelp-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.caphelp-lead{font-size:12.5px;color:var(--label2);font-weight:500}
.discloseBody{margin-top:6px}
.discloseBody p{font-size:12.5px;color:var(--label3);line-height:1.5}
.codelegend{display:flex;gap:16px;flex-wrap:wrap;margin-top:11px;font-size:11.5px;color:var(--label3)}
.codelegend code{background:var(--bg);border:.5px solid var(--sep);border-radius:5px;padding:1px 6px}
.codelegend .ld{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.ld.u{background:var(--blue)}.ld.o{background:var(--purple)}.ld.m{background:var(--green)}
.serchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.serchip{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;background:var(--surface2);border:.5px solid var(--sep);border-radius:8px;padding:5px 9px;color:var(--label2)}
.serchip .n{color:var(--label4);font-weight:700}
.serchip .x{cursor:pointer;color:var(--label3);font-size:13px;line-height:1}
.serchip .x:hover{color:var(--red)}
.serchip.ro .x{display:none}
.serchip.ro{padding-right:9px}

.field{margin-bottom:13px}
.field label{display:block;font-size:11.5px;color:var(--label2);margin-bottom:6px;font-weight:600}
.field input,.field select{width:100%;background:var(--surface2);border:.5px solid var(--sep);border-radius:11px;padding:11px 13px;color:var(--label);font-size:13.5px;font-family:inherit}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.18)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:13px}

.actions{display:flex;gap:10px;flex-wrap:wrap}
.ein{width:78px;background:var(--surface2);border:.5px solid var(--sep);border-radius:8px;padding:7px 9px;color:var(--label);font-size:13px;font-family:inherit;text-align:right}
.ein:focus{outline:none;border-color:var(--blue)}

let EWAY_THRESHOLD=50000;                                // overridden by the server's config on load (single source of truth)
const ewayRequired=o=>(o.total||0)>EWAY_THRESHOLD;

 hyperlocal:{label:'Hyperlocal',providers:['Uber','Porter','Rapido','Dunzo','Shadowfax','Borzo','Other'],refLabel:'Order / trip ID',refShort:'Order ID',refPlaceholder:'e.g. 4F2K-88AB'},

 international:{label:'International',providers:['DHL','FedEx','UPS','Aramex','India Post EMS','Other'],refLabel:'AWB / tracking number',refShort:'AWB',refPlaceholder:'e.g. 7700123456'},
};

/* ---- serial-number architecture (MC ▸ OC ▸ primary) ----

const ITEM4={'EUPH-ANC-BLK':'EUAN','AURA-TWS-WHT':'AUTW','QMAG-PB-10K':'QM10','GAN3-65W':'GN65','GAN3-45W':'GN45','AVNT-CL-CBL':'AVCL','PDS-25W-ADP':'PD25','MAG3-STND':'MG3S'};
const PRIMARY_RE=/^ERX[A-Z0-9]{4}\d{12}$/,OC_RE=/^OC[A-Z0-9]{4}\d{10}$/,MC_RE=/^MC[A-Z0-9]{4}\d{9}$/;

function checkOk(c,d){const g=c.slice(d);return gs1Check(g.slice(0,-1))===+g.slice(-1);}
function classifyCode(code){const c=String(code||'').trim().toUpperCase();if(MC_RE.test(c))return checkOk(c,6)?'mc':'mc_bad';if(OC_RE.test(c))return checkOk(c,6)?'oc':'oc_bad';if(PRIMARY_RE.test(c))return checkOk(c,7)?'primary':'primary_bad';return 'unknown';}

function genPrimaryRaw(item,ww,n){const b=ww+String(n).padStart(7,'0');return 'ERX'+item+b+gs1Check(b);}
function genPrimary(sku,n){return genPrimaryRaw(ITEM4[sku]||'XXXX',WW,n);}
function genOCcode(sku,n){const b=WW+String(n).padStart(5,'0');return 'OC'+(ITEM4[sku]||'XXXX')+b+gs1Check(b);}
function genMCcode(sku,n){const b=WW+String(n).padStart(4,'0');return 'MC'+(ITEM4[sku]||'XXXX')+b+gs1Check(b);}
// Expand a contiguous run of primaries from a first serial (sealed carton / manual fallback).
function expandRangeCodes(start,count){
 const c=String(start||'').toUpperCase();if(classifyCode(c)!=='primary'||!(count>=1))return [];
 const item=c.slice(3,7),ww=c.slice(7,11),seq0=Number(c.slice(11,18));
 if(seq0+count-1>9999999)return [];
 const out=[];for(let i=0;i<count;i++)out.push(genPrimaryRaw(item,ww,seq0+i));return out;
}

/* ---- Zoho serial validation layer ----
   Every captured serial is checked against the in-stock serial pool Zoho holds

function poolPick(sku,exclude){const a=(ZOHO_POOL[sku]||[]).filter(s=>!exclude.has(s)&&!usedSerials.has(s));return a.length?a[rnd(0,a.length-1)]:genSerial(sku);}

/* ---- carton aggregation (MC ▸ OC ▸ primary S/N) ----
   Scanning a master- or outer-carton label expands to every primary serial under
   it; each is still validated against the Zoho pool and capped to the line qty.
   Prod resolves via /aggregation; demo builds a hierarchy over each SKU's pool. */
const AGG={};
const OC_SIZE=4, MC_OCS=2;            // demo packing: 4 units/OC, 2 OCs/MC (8 units/MC)
function buildAgg(){
 Object.keys(ZOHO_POOL).forEach(sku=>{
  const pool=ZOHO_POOL[sku];const ocs=[];let oc=0,mc=0;
  for(let k=0;k<pool.length;k+=OC_SIZE){const code=genOCcode(sku,++oc);AGG[code]={type:'oc',sku,serials:pool.slice(k,k+OC_SIZE)};ocs.push(code);}
  for(let k=0;k<ocs.length;k+=MC_OCS){const code=genMCcode(sku,++mc);const childOcs=ocs.slice(k,k+MC_OCS);AGG[code]={type:'mc',sku,ocs:childOcs,serials:childOcs.flatMap(o=>AGG[o].serials)};}

}
buildAgg();
async function aggResolve(code){

 try{const r=await fetch('/.netlify/functions/aggregation?code='+encodeURIComponent(code),{credentials:'include'});if(!r.ok)return null;const j=await r.json();return (j.type&&j.type!=='primary'&&Array.isArray(j.serials)&&j.serials.length)?{type:j.type,sku:j.sku,serials:j.serials}:null;}catch(e){return null;}
}
// A unit is available if it's in stock (Zoho pool) and not already on this order.
function unitAvailable(l,s,onOrder){

 if(DEMO_MODE)return (ZOHO_POOL[l.sku]||[]).includes(s)&&!usedSerials.has(s);

}
// Master carton: only scanned when WHOLE and INTACT. Once a unit inside has been
// consumed (half-emptied), the MC is refused and the operator scans its OCs.
function captureCarton(orderId,node,code){
 const o=orders.find(x=>x.id===orderId),l=o.lines.find(x=>x.sku===node.sku);
 if(!l){toast('📦 '+code+' is '+node.sku+' — not on this order','var(--amber)');return 0;}
 const remaining=l.qty-l.serials.length;
 if(remaining<=0){toast(l.name+' is already fully serialized','var(--amber)');return 0;}
 const onOrder=new Set(o.lines.flatMap(x=>x.serials));
 const free=node.serials.filter(s=>unitAvailable(l,s,onOrder));
 if(node.type==='mc'){
  if(free.length<node.serials.length)return toastN('📦 Master carton '+code+' is already opened — scan its outer cartons (OC)');
  if(node.serials.length>remaining)return toastN('📦 '+code+' holds '+node.serials.length+' units — more than the '+remaining+' this order needs. Scan outer cartons (OC)');
  return commitCartonSerials(o,l,free,code,'Master carton');

 const take=free.slice(0,remaining);  // OC: take its available units, up to what's needed

}

}

   msg:'Ledger unavailable — settlement status couldn\u2019t be loaded from Zoho. Verify the dealer\u2019s open invoices before approving.'};
 }
 const total=led.reduce((s,i)=>s+(i.balance||0),0),count=led.length;

   :count+' pending invoice'+(count>1?'s':'')+' · '+fmt(total)+' outstanding'+(oldestDays?' · oldest '+oldestDays+'d overdue':'')+'. Collect in full before clearing.';

}

 if(hrs>=sla)return{flag:true,level:hrs>=sla*2?'bad':'warn',reason:`Stuck ${Math.floor(hrs)}h · ${STATUS_LABEL[o.status]||o.status}`};

function countBy(k){
 const co=cityOrders();
 const f={all:o=>roleStates().includes(o.status),new:o=>['NEW','ACCOUNTS_REVIEW'].includes(o.status),hold:o=>o.status==='HELD',
  approved:o=>['CREDIT_OK','PICKING'].includes(o.status),
  toinvoice:o=>o.status==='SERIALIZED',topick:o=>['CREDIT_OK','PICKING'].includes(o.status),awaiting:o=>o.status==='SERIALIZED',
  todispatch:o=>o.status==='INVOICED',shipped:o=>['DISPATCHED','DELIVERED'].includes(o.status),fulfil:o=>['INVOICED','DISPATCHED','DELIVERED'].includes(o.status),
  attention:o=>roleStates().includes(o.status)&&attentionInfo(o).flag};
 return co.filter(f[k]).length;
}

function srcBadge(o){return o.source==='dealer'?'<span class="srcb dealer">Dealer OS</span>':'<span class="srcb fos">Unolo</span>';}
function renderQueue(){
 const items=visible();
 document.getElementById('queueTitle').textContent=ROLE==='accounts'?'Accounts queue':'Warehouse queue';
 document.getElementById('queueSub').textContent=items.length+' order'+(items.length===1?'':'s')+' · '+CITY;
 const el=document.getElementById('qlist');
 if(!items.length){el.innerHTML=`<div class="qempty">Nothing here right now.<br>${ROLE==='accounts'?'New orders from Unolo land in this queue.':'Credit-cleared orders appear here to pick & serialize.'}</div>`;return;}
 el.innerHTML=items.map(o=>{
  const cl=clearanceFor(o);let flag='';
  if(ROLE==='accounts'&&['NEW','ACCOUNTS_REVIEW'].includes(o.status)&&!cl.cleared)flag=cl.known?`<span class="flag over">⚠ ${cl.count} pending</span>`:`<span class="flag over">⚠ ledger?</span>`;
  if(o.status==='SERIALIZED')flag=`<span class="flag sn">${serialCount(o)} S/N ready</span>`;
  if(isReopened(o))flag=`<span class="flag rv">⟲ was ${STATUS_LABEL[o.revokedFrom]}</span>`;
  const at=attentionInfo(o);const atPill=at.flag?`<span class="flag att ${at.level}" title="${at.reason}">⚠ ${at.reason}</span>`:'';
  return `<div class="qrow${at.flag?' needs-att':''}" onclick="openOrder('${o.id}')">

    <div class="amt">${fmt(o.total)}</div>
    <div class="sub">${o.id} · ${unitCount(o)} unit${unitCount(o)>1?'s':''} · ${o.lines.length} SKU${o.lines.length>1?'s':''} · ${o.source==='dealer'?'self-order':'via '+o.exec}</div>
    <div class="right">${srcBadge(o)}<span class="pill p-${statusPill(o)}">${statusLabel(o)}</span>${atPill||flag}<span class="age">${ageStr(o.createdAt)}</span></div>
  </div>`;
 }).join('');
}

function closeDrawer(){selectedId=null;document.getElementById('drawer').classList.remove('open');document.getElementById('scrim').classList.remove('open');}

 <div class="dtotal"><span class="v">${fmt(o.total)}</span><span class="l">${unitCount(o)} serialized units · incl. GST</span></div></div>`;}
function lineTable(o){return `<div class="block"><h3>Order lines</h3><table>

function renderDrawer(){const o=orders.find(x=>x.id===selectedId);if(!o)return;document.getElementById('drawerBody').innerHTML=`<div class="dwrap">${ROLE==='accounts'?accountsView(o):warehouseView(o)}</div>`;}

function accountsView(o){
 // Approved & in-flight at the warehouse — read-only summary section
 if(['CREDIT_OK','PICKING'].includes(o.status)){
  const cl=clearanceFor(o);
  const cap=serialCount(o),tot=unitCount(o),pct=tot?Math.round(cap/tot*100):0;
  const stamp=(o.stamps&&o.stamps.CREDIT_OK)?fmtStamp(o.stamps.CREDIT_OK):'';
  const prog = o.status==='PICKING'
   ? `<div class="doneflag amber" style="margin-top:10px">📦 Warehouse serializing — ${cap} of ${tot} unit${tot>1?'s':''} captured · ${pct}%</div>`
   : `<div class="doneflag" style="margin-top:10px;background:rgba(0,122,255,.10);border:.5px solid rgba(0,122,255,.22);color:#0066CC">📦 Queued with the ${CITIES[CITY].wh} warehouse to pick &amp; serialize</div>`;
  return head(o)
   +`<div class="doneflag green" style="margin-top:16px">✓ Order approved by accounts${o.edited?' · edited at approval':''}${stamp?' · '+stamp:''}</div>`
   +prog
   +`<div class="block"><h3>Approved order summary</h3>
      <div class="credit">
       <div><div class="l">Order value</div><div class="v">${fmt(o.total)}</div></div>
       <div><div class="l">Units cleared</div><div class="v">${tot}</div></div>
       <div><div class="l">Ledger at approval</div><div class="v">${cl.cleared?'Clear':(cl.known?cl.count+' pending':'Unavailable')}</div></div>
      </div>
      <div class="csrc" style="margin-top:11px">Released to the warehouse — read-only. The invoice is raised once serials are relayed back.</div>
     </div>`
   +lineTable(o)
   +`<div class="block"><h3>Revoke approval</h3><div class="csrc" style="margin-bottom:10px">Pull this order back to review to change quantities, rates, or lines. Any captured serials are released to stock.</div><div class="actions"><button class="btn danger" onclick="askRevoke('${o.id}','${o.status}')">Revoke approval &amp; reopen</button></div><div class="reasonbox" id="reasonBox"></div></div>`
   +(cap?manifest(o):'')
   +timeline(o);
 }
 if(['INVOICED','DISPATCHED','DELIVERED'].includes(o.status)) return accountsFulfil(o);
 // Stage 2: ready to invoice (serials in hand)
 if(o.status==='SERIALIZED'){
  return head(o)+`<div class="doneflag green" style="margin-top:16px">✓ Order approved · Warehouse captured all ${unitCount(o)} serial numbers</div>
   ${manifest(o)}
   ${lineTable(o)}
   <div class="block"><h3>Raise invoice</h3>
    <div class="field"><label>Invoice number (auto-generated in Zoho if left blank)</label><input id="invField" placeholder="INV/26/____"></div>
    <div class="csrc" style="margin:-4px 0 14px">All ${unitCount(o)} serials are written onto the Zoho tax invoice — for warranty registration and channel anti-diversion.</div>
    <button class="btn yellow wide" onclick="invoice('${o.id}')">Raise invoice &amp; release for dispatch</button>
   </div>
   <div class="block"><h3>Revoke approval</h3><div class="csrc" style="margin-bottom:10px">Need to change the order before invoicing? Reopen it for review — captured serials are released back to stock.</div><div class="actions"><button class="btn danger" onclick="askRevoke('${o.id}','SERIALIZED')">Revoke approval &amp; reopen</button></div><div class="reasonbox" id="reasonBox"></div></div>`;
 }
 // Stage 1: credit review
 if(editId===o.id) return head(o)+editLineTable(o);
 const cl=clearanceFor(o);
 let act;
 if(o.creditHold){
  act=`<div class="doneflag amber">⛔ Credit hold — ${o.holdReason||'dues past credit period + grace'}</div>
   <div class="csrc" style="margin-top:8px">Approval &amp; invoicing are blocked until the dealer clears overdue dues. Release the hold (with a reason) to return this order to review.</div>
   <div class="actions" style="margin-top:14px"><button class="btn green" onclick="askReason('${o.id}','releaseHold')">Release hold</button><button class="btn danger" onclick="askReason('${o.id}','reject')">Reject</button></div>
   <div class="reasonbox" id="reasonBox"></div>`;
 }else if(o.status==='HELD'){
  act=`<div class="doneflag amber">⏸ On hold — ${o.holdReason||''}</div>
   <div class="actions" style="margin-top:14px"><button class="btn green" onclick="approve('${o.id}')">Approve</button><button class="btn blue" onclick="startEdit('${o.id}')">Edit &amp; Approve</button><button class="btn danger" onclick="askReason('${o.id}','reject')">Reject</button></div>
   <div class="reasonbox" id="reasonBox"></div>`;
 }else{
  act=`<div class="actions"><button class="btn green" onclick="approve('${o.id}')">Approve</button><button class="btn blue" onclick="startEdit('${o.id}')">Edit &amp; Approve</button><button class="btn ghost" onclick="askReason('${o.id}','hold')">Hold</button><button class="btn danger" onclick="askReason('${o.id}','reject')">Reject</button></div>
   <div class="reasonbox" id="reasonBox"></div>
   <div class="csrc" style="margin-top:11px">Invoice is raised later — after the warehouse captures serial numbers and relays them back.</div>`;
 }
 return head(o)+(isReopened(o)?`<div class="doneflag amber" style="margin-top:16px">⟲ Reopened after revoke — was ${STATUS_LABEL[o.revokedFrom]}${o.revokeReason?' · '+o.revokeReason:''}${o.revokedAt?' · '+fmtStamp(o.revokedAt):''}${o.revokeCount>1?' · revoked '+o.revokeCount+'×':''}</div>`:'')+`
 <div class="block"><h3>Ledger — pending invoices <span class="hint">${cl.cleared?'cleared':(cl.known?cl.count+' open':'unavailable')}</span></h3>
  ${ledgerTable(o,cl)}
  <div class="cnote ${cl.level}" style="margin-top:12px">${cl.cleared?'✓':(cl.known?'⚠':'?')} ${cl.msg}</div>
  <div class="csrc">Pulled live from the Zoho ledger · GSTIN ${o.dealer.gstin}</div>
 </div>
 ${lineTable(o)}
 <div class="block"><h3>Step 1 · Clearance decision</h3>${act}</div>`;
}

function ewayBlock(o){
 const need=ewayRequired(o);
 if(o.eway){const e=o.eway;return `<div class="block"><h3>E-way bill</h3>
   <div class="doneflag green">✓ EWB ${e.number} <span class="hint" style="margin-left:auto">${e.partB?'Part A + B':'Part A'}</span></div>
   <div class="ewmeta">
    <div><span class="l">Transporter</span><span class="v">${e.transporter||'—'}</span></div>
    <div><span class="l">Vehicle</span><span class="v">${e.vehicle||'Part A only'}</span></div>
    <div><span class="l">Mode</span><span class="v">${e.mode||'Road'}</span></div>
    <div><span class="l">Approx. distance</span><span class="v">${e.distanceKm} km</span></div>
    <div><span class="l">Valid till</span><span class="v">${e.validTill?fmtStamp(e.validTill):'—'}</span></div>
   </div></div>`;}
 if(!need){return `<div class="block"><h3>E-way bill</h3><div class="csrc">Not required — consignment ${fmt(o.total)} is within the ${fmt(EWAY_THRESHOLD)} threshold.</div></div>`;}
 if(o.status!=='INVOICED'){return `<div class="block"><h3>E-way bill <span class="hint">required</span></h3><div class="doneflag amber">⛔ Consignment ${fmt(o.total)} exceeds ${fmt(EWAY_THRESHOLD)} — e-way bill still pending.</div></div>`;}
 return `<div class="block"><h3>E-way bill <span class="hint">required</span></h3>
   <div class="csrc" style="margin-bottom:13px">Consignment ${fmt(o.total)} exceeds ${fmt(EWAY_THRESHOLD)} — generate the e-way bill before this can be dispatched. Over 50 km, the vehicle number (Part B) is mandatory.</div>
   <div class="two">
    <div class="field"><label>E-way bill number (12 digits)</label><input id="ewNumber" inputmode="numeric" placeholder="e.g. 1814 0023 5567" autocomplete="off"></div>
    <div class="field"><label>Approx. distance (km)</label><input id="ewDist" inputmode="numeric" placeholder="e.g. 420" autocomplete="off" oninput="ewToggleVeh()"></div>
   </div>
   <div class="two">
    <div class="field"><label>Transporter</label><input id="ewTransporter" placeholder="e.g. VRL Logistics" autocomplete="off"></div>
    <div class="field"><label>Mode</label><select id="ewMode"><option>Road</option><option>Rail</option><option>Air</option><option>Ship</option></select></div>
   </div>
   <div class="field"><label>Vehicle number <span class="hint" id="ewVehReq">· optional ≤ 50 km</span></label><input id="ewVehicle" placeholder="e.g. WB02AB1234" autocapitalize="characters" autocomplete="off"></div>
   <div class="actions">${DEMO_MODE?`<button class="btn ghost" onclick="ewDemoFill()">Demo · auto-fill</button>`:''}<button class="btn blue wide" onclick="generateEway('${o.id}')">Generate e-way bill</button></div>
 </div>`;
}
function ewToggleVeh(){const d=parseInt((document.getElementById('ewDist')||{}).value,10)||0;const r=document.getElementById('ewVehReq');if(r)r.textContent=d>50?'· required (Part B)':'· optional ≤ 50 km';}
function ewDemoFill(){let n='';for(let i=0;i<12;i++)n+=rnd(0,9);const f=document.getElementById('ewNumber');if(f)f.value=n.replace(/(\d{4})(\d{4})(\d{4})/,'$1 $2 $3');const d=document.getElementById('ewDist');if(d)d.value=rnd(60,800);ewToggleVeh();const t=document.getElementById('ewTransporter');if(t)t.value=pick(['VRL Logistics','TCI Freight','Gati','Safexpress','Delhivery FTL']);const v=document.getElementById('ewVehicle');if(v)v.value='WB'+rnd(10,99)+pick(['AB','CD','GH','KL'])+rnd(1000,9999);}
function generateEway(id){const o=orders.find(x=>x.id===id);if(!o)return;
 const number=((document.getElementById('ewNumber')||{}).value||'').replace(/\s/g,'');
 const distanceKm=parseInt((document.getElementById('ewDist')||{}).value,10)||0;
 const transporter=((document.getElementById('ewTransporter')||{}).value||'').trim();
 const mode=(document.getElementById('ewMode')||{}).value||'Road';
 const vehicle=((document.getElementById('ewVehicle')||{}).value||'').toUpperCase().replace(/\s/g,'');
 if(!/^\d{12}$/.test(number)){toast('E-way bill number must be 12 digits','var(--red)');return;}
 if(!distanceKm){toast('Enter the approximate distance','var(--amber)');return;}
 const partB=distanceKm>50;
 if(partB&&!vehicle){toast('Vehicle number is required over 50 km (Part B)','var(--red)');return;}
 const days=Math.max(1,Math.ceil(distanceKm/200));
 o.eway={number,transporter,mode,vehicle,distanceKm,partB,generatedAt:Date.now(),validTill:Date.now()+days*86400000};
 persist(id,'eway',{number,distanceKm,transporter,mode,vehicle});
 toast('E-way bill '+number+' generated','var(--green)');renderDrawer();refresh();}
function accountsFulfil(o){
 const inv=`<div class="doneflag green">✓ Invoiced ${o.invoiceNo||''}</div>`;
 let body;
 if(o.status==='INVOICED'){
  body=`<div class="doneflag amber" style="margin-top:10px">🚚 Awaiting dispatch by the ${CITIES[CITY].wh} warehouse.</div>`;
 }else{
  body=`<div class="doneflag green" style="margin-top:10px">📦 Dispatched · ${dispatchLine(o)}</div>`;
  if(o.status==='DELIVERED'){
   body+=`<div class="doneflag green" style="margin-top:10px">✓ Delivered${o.deliveryNote?' — '+o.deliveryNote:''}${o.deliveredAt?' · '+ageStr(o.deliveredAt):''}</div>${podLink(o)}`;
  }else{
   body+=podCapture(o.id);
  }
 }
 return head(o)+`<div class="block"><h3>Fulfilment <span class="hint">${STATUS_LABEL[o.status]}</span></h3>${inv}${body}</div>`+ewayBlock(o)+(o.status==='INVOICED'?`<div class="block"><h3>Revoke approval</h3><div class="csrc" style="margin-bottom:10px">Not shipped yet — revoking voids invoice ${o.invoiceNo||''} in Zoho, returns serials to stock, and reopens the order for review.</div><div class="actions"><button class="btn danger" onclick="askRevoke('${o.id}','INVOICED')">Revoke approval &amp; void invoice</button></div><div class="reasonbox" id="reasonBox"></div></div>`:'')+manifest(o)+timeline(o);
}
let pendingPod={}; // id -> {name,type,size,dataUrl}
function podCapture(id){const has=(orders.find(x=>x.id===id)||{}).pod;return `<div class="field" style="margin-top:14px"><label>Proof of delivery <span class="hint">required — stamped receipt / signed invoice</span></label>
   <input id="podFile-${id}" type="file" accept="image/*,application/pdf" capture="environment" style="display:none" onchange="onPodPick('${id}',this)">
   <button class="btn ghost wide" onclick="document.getElementById('podFile-${id}').click()">📷 Capture or upload POD</button>
   <div id="podPreview-${id}">${has?`<div class="podthumb"><div class="podpdf">POD</div><div class="podmeta"><div class="pn">${has.name}</div><div class="sku">on file · re-upload to replace</div></div></div>`:''}</div></div>
   <div class="field" style="margin-top:10px"><label>Received by (optional)</label><input id="podField-${id}" placeholder="e.g. Store manager — R. Sharma"></div>

function fileToDataUrl(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}

function fmtStamp(ts){const d=new Date(ts);if(isNaN(d))return '';return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true});}
function demoStamps(status,createdAt){const so=['NEW','HELD','CREDIT_OK','PICKING','SERIALIZED','INVOICED','DISPATCHED','DELIVERED'],mile=['NEW','CREDIT_OK','SERIALIZED','INVOICED','DISPATCHED','DELIVERED'];const reached=mile.filter(k=>so.indexOf(status)>=so.indexOf(k));const span=Math.max(0,Date.now()-createdAt),st={};reached.forEach((k,i)=>{st[k]=Math.round(createdAt+span*(reached.length>1?i/(reached.length-1):0));});return st;}
function timeline(o){
 const stOrder=['NEW','HELD','CREDIT_OK','PICKING','SERIALIZED','INVOICED','DISPATCHED','DELIVERED'];
 const at=k=>stOrder.indexOf(o.status)>=stOrder.indexOf(k);
 const revs=(o.revocations&&o.revocations.length)?o.revocations:(o.revokedFrom?[{from:o.revokedFrom,at:o.revokedAt,reason:o.revokeReason}]:[]);
 const steps=[
  {t:o.source==='dealer'?'Placed via Dealer OS':'Booked in Unolo',s:'by '+(o.placedBy||o.exec),done:true,k:'NEW'},
  ...revs.map(rv=>({t:'Approval revoked — back to review',s:'was '+(STATUS_LABEL[rv.from]||rv.from)+(rv.reason?' · '+rv.reason:''),done:true,k:'REVOKED',ts:rv.at})),
  {t:'Order approved by accounts',s:'',done:at('CREDIT_OK'),k:'CREDIT_OK'},
  {t:'Serial numbers captured',s:serialCount(o)+' / '+unitCount(o)+' units · '+CITIES[o.city].wh,done:at('SERIALIZED'),k:'SERIALIZED'},
  {t:'Invoice raised by accounts',s:o.invoiceNo?('Invoice '+o.invoiceNo+' · serials attached'):'awaiting serials',done:at('INVOICED'),k:'INVOICED'},
  ...(ewayRequired(o)?[{t:'E-way bill generated',s:o.eway?(o.eway.number+(o.eway.vehicle?' · '+o.eway.vehicle:'')):'required — consignment over '+fmt(EWAY_THRESHOLD),done:!!o.eway,k:'EWAY',ts:o.eway?o.eway.generatedAt:null}]:[]),
  {t:'Dispatched',s:(o.provider||o.courier)?dispatchLine(o):'pending',done:at('DISPATCHED'),k:'DISPATCHED'},
  {t:'Delivered',s:'to dealer',done:o.status==='DELIVERED',k:'DELIVERED'},
 ];
 return `<div class="block"><h3>Progress</h3><div class="timeline">${steps.map(s=>{const _ts=s.done?(s.ts||(o.stamps&&o.stamps[s.k])||(s.k==='NEW'?o.createdAt:s.k==='REVOKED'?o.revokedAt:s.k==='DELIVERED'?o.deliveredAt:null)):null;return `<div class="tl ${s.done?'done':'pending'}${s.k==='REVOKED'?' rv':''}"><div class="dot">${s.done?'<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#04210d" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>':''}</div><div class="t">${s.t}</div>${s.s?`<div class="s">${s.s}</div>`:''}${_ts?`<div class="tlts">${fmtStamp(_ts)}</div>`:''}</div>`;}).join('')}</div></div>`;
}

function updateLineDom(o,l){
 const prog=document.getElementById('prog-'+l.sku),bar=document.getElementById('bar-'+l.sku),chips=document.getElementById('chips-'+l.sku),scanrow=document.getElementById('scanrow-'+l.sku);

 if(bar){const i=bar.firstElementChild;i.style.width=pct+'%';i.classList.toggle('done',ld);}

// Core add — surgical DOM update only; never tears down the active input.
function addSerialValue(id,sku,val){
 const o=orders.find(x=>x.id===id),l=o.lines.find(x=>x.sku===sku);
 if(l.serials.length>=l.qty){toast('This SKU is already fully serialized','var(--amber)');return false;}
 if(usedSerials.has(val)||o.lines.some(x=>x.serials.includes(val))){toast('Duplicate serial — already scanned','var(--red)');return false;}
 if(strictZoho()&&inZohoPool(l,val)===false){toast('✗ Not in Zoho in-stock for this SKU','var(--red)');return false;}
 usedSerials.add(val);l.serials.push(val);

function commitScan(id,sku,el){const val=el.value;el.value='';el._fast=0;if(!normalizeScan(val))return;ingestScan(id,val,sku);}
// Code 128 payload arrives already checksum-verified by the scanner. We classify
// by the ERONIX scheme and validate the embedded GS1 check digit.
const SERIAL_RE=PRIMARY_RE; // primary serials only
function normalizeScan(raw){return raw.replace(/[\x00-\x1F\x7F]/g,'').trim();}
function validSerial(s){if(!s)return{ok:false,why:'Empty scan'};const k=classifyCode(s);
 if(k==='primary')return{ok:true};
 if(k==='primary_bad')return{ok:false,why:'Check digit failed — possible mis-scan'};
 if(k.startsWith('mc')||k.startsWith('oc'))return{ok:false,why:'That is a carton label, not a unit serial'};

// Enter/Tab commit immediately; track inter-key speed to detect a scanner burst.
function onScanKey(e,id,sku){const el=e.target,now=performance.now(),gap=now-(el._last||0);el._last=now;el._fast=gap<35?(el._fast||0)+1:0;if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();commitScan(id,sku,el);}}
// Fallback for no-suffix scanners: commit on idle after a fast burst.
function onScanInput(e,id,sku){const el=e.target;clearTimeout(el._idle);el._idle=setTimeout(()=>{if(el.value.trim()&&(el._fast||0)>=3)commitScan(id,sku,el);},110);}
function removeSerial(id,sku,i){
 const o=orders.find(x=>x.id===id),l=o.lines.find(x=>x.sku===sku);
 usedSerials.delete(l.serials[i]);l.serials.splice(i,1);
 updateLineDom(o,l);refreshSerialChrome(o);renderNav();renderStats();renderFilters();renderQueue();renderCityMenu();focusLine(sku);

function autofillLine(id,sku){
 const o=orders.find(x=>x.id===id),l=o.lines.find(x=>x.sku===sku);
 while(l.serials.length<l.qty){const s=poolPick(l.sku,new Set(l.serials));usedSerials.add(s);l.serials.push(s);}
 if(o.status==='CREDIT_OK')o.status='PICKING';
 updateLineDom(o,l);refreshSerialChrome(o);renderNav();renderStats();renderFilters();renderQueue();renderCityMenu();
 const nxt=o.lines.find(x=>x.serials.length<x.qty);if(nxt)focusLine(nxt.sku);

// Sealed-carton / manual fallback: expand a contiguous run from the first S/N and
// route every unit through the SAME validation as a scan. If the carton isn't
// actually contiguous, the first absent unit is rejected and the picker scans it.
async function rangeFill(id,sku){
 const o=orders.find(x=>x.id===id),l=o.lines.find(x=>x.sku===sku);
 const start=normalizeScan(document.getElementById('rfstart-'+sku).value).toUpperCase();
 if(classifyCode(start)!=='primary'){toast('Enter a valid first serial number to fill from','var(--amber)');return;}
 const need=l.qty-l.serials.length;if(need<=0){toast(l.name+' is already complete','var(--amber)');return;}

 for(const s of run){
  const r=await ingestScan(id,s,sku);
  if(r>0){added++;continue;}
  toast('Stopped at '+s+' — not in stock here. Scan that unit manually.','var(--amber)');break;
 }

}
function toggleDisclose(btn){const b=btn.nextElementSibling;const open=b.style.display==='none';b.style.display=open?'block':'none';btn.classList.toggle('on',open);}
function toggleRange(sku){const r=document.getElementById('rangerow-'+sku),n=document.getElementById('rfnote-'+sku),t=document.getElementById('rangetog-'+sku);const open=!r||r.style.display==='none';if(r)r.style.display=open?'flex':'none';if(n)n.style.display=open?'block':'none';if(t)t.classList.toggle('on',open);if(open){const i=document.getElementById('rfstart-'+sku);if(i)i.focus();}}
function submitSerials(id){
 const o=orders.find(x=>x.id===id);if(!fullySerialized(o)){toast('Capture every serial first','var(--amber)');return;}
 o.status='SERIALIZED';
 if(!DEMO_MODE)(async()=>{for(const l of o.lines)await apiAction(id,'serialize',{sku:l.sku,serials:l.serials});await apiAction(id,'submitSerials');})().catch(e=>toast('Sync failed — '+e.message,'var(--red)'));

function approve(id){const o=orders.find(x=>x.id===id);if(o&&o.creditHold){toast('Release the credit hold first','var(--amber)');return;}o.status='CREDIT_OK';persist(id,'approve');toast('Approved — dealer, FOS & '+CITIES[CITY].wh+' notified','var(--green)');closeDrawer();refresh();}
function hold(id,reason){const o=orders.find(x=>x.id===id);o.status='HELD';o.holdReason=reason||'Manual hold by accounts';persist(id,'hold',{reason:o.holdReason});toast('On hold — dealer, FOS & warehouse notified','var(--amber)');closeDrawer();refresh();}
function reject(id,reason){const o=orders.find(x=>x.id===id);o.status='REJECTED';o.rejectReason=reason||'';persist(id,'reject',{reason:o.rejectReason});toast('Rejected — dealer, FOS & warehouse notified','var(--red)');closeDrawer();refresh();}
function invoice(id){const o=orders.find(x=>x.id===id);if(!fullySerialized(o)){toast('Serials incomplete','var(--red)');return;}const inv=(document.getElementById('invField')||{}).value;o.invoiceNo=inv||('INV/26/'+rnd(4000,4999));o.status='INVOICED';persist(id,'invoice',{invoiceNo:o.invoiceNo});toast('Invoice '+o.invoiceNo+' raised — released for dispatch','var(--blue)');closeDrawer();refresh();}

let editId=null;
function askReason(id,kind){const box=document.getElementById('reasonBox');if(!box)return;
 const L=kind==='hold'?'Reason for hold':kind==='releaseHold'?'Reason for releasing the credit hold':'Reason for rejection';
 const PH=kind==='hold'?'e.g. Pending invoices unsettled, collect payment':kind==='releaseHold'?'e.g. Dealer cleared dues — NEFT ref 4821 / approved by management':'e.g. Duplicate order / dealer cancelled';
 const BL=kind==='hold'?'Place on hold':kind==='releaseHold'?'Release hold':'Reject order';
 const BC=kind==='hold'?'ghost':kind==='releaseHold'?'green':'danger';
 box.innerHTML=`<div class="field" style="margin-top:12px"><label>${L} \u2014 logged on the order</label><textarea id="reasonInput" class="reasontext" rows="2" placeholder="${PH}"></textarea></div><div class="actions"><button class="btn ${BC}" onclick="confirmReason('${id}','${kind}')">${BL}</button><button class="btn ghost" onclick="cancelReason()">Cancel</button></div>`;
 setTimeout(()=>{const r=document.getElementById('reasonInput');if(r)r.focus();},40);}
function cancelReason(){const b=document.getElementById('reasonBox');if(b)b.innerHTML='';}
function confirmReason(id,kind){const v=(document.getElementById('reasonInput')||{}).value||'';if(!v.trim()){toast('Add a brief reason','var(--amber)');return;}if(kind==='hold')hold(id,v.trim());else if(kind==='releaseHold')releaseHold(id,v.trim());else reject(id,v.trim());}
function releaseHold(id,reason){const o=orders.find(x=>x.id===id);if(!o)return;o.creditHold=false;o.holdClearedAt=Date.now();o.creditHoldReleaseReason=reason||'';if(o.status==='HELD')o.status='ACCOUNTS_REVIEW';persist(id,'releaseHold',{reason:reason||''});toast('Credit hold released — back in review','var(--green)');closeDrawer();refresh();}
function revoke(id,reason){const o=orders.find(x=>x.id===id);if(!o)return;const from=o.status;
 o.lines.forEach(l=>l.serials=[]);delete o.invoiceNo;delete o.zohoInvoiceId;delete o.invoiceState;
 o.revokedFrom=from;o.revokedAt=Date.now();o.revokeReason=reason||'';o.revokeCount=(o.revokeCount||0)+1;
 o.revocations=o.revocations||[];o.revocations.push({from,at:o.revokedAt,reason:reason||''});
 if(o.stamps){['CREDIT_OK','PICKING','SERIALIZED','INVOICED','DISPATCHED','DELIVERED'].forEach(k=>delete o.stamps[k]);}
 o.stamps=o.stamps||{};o.stamps.REVOKED=o.revokedAt;o.stamps.ACCOUNTS_REVIEW=o.revokedAt;
 o.status='ACCOUNTS_REVIEW';
 persist(id,'revoke',{reason:reason||'',confirm:true});
 toast(from==='INVOICED'?'Revoked \u2014 invoice voided, reopened for review':'Approval revoked \u2014 reopened for review','var(--amber)');
 closeDrawer();refresh();}
function askRevoke(id,from){const box=document.getElementById('reasonBox');if(!box)return;const o=orders.find(x=>x.id===id)||{};const inv=from==='INVOICED';
 box.innerHTML=`<div class="field" style="margin-top:12px"><label>Reason for revoking \u2014 logged & sent to dealer & FOS</label><textarea id="reasonInput" class="reasontext" rows="2" placeholder="e.g. Wrong quantity / dealer revised the order / pricing correction"></textarea></div>${inv?`<div class="csrc" style="margin:-2px 0 10px;color:var(--red)">\u26a0 Invoice ${o.invoiceNo||''} will be voided in Zoho and its serials returned to stock. If the GST period is already filed, raise a credit note instead.</div>`:''}<div class="actions"><button class="btn danger" onclick="confirmRevoke('${id}')">${inv?'Revoke &amp; void invoice':'Revoke approval'}</button><button class="btn ghost" onclick="cancelReason()">Cancel</button></div>`;
 setTimeout(()=>{const r=document.getElementById('reasonInput');if(r)r.focus();},40);}
function confirmRevoke(id){const v=(document.getElementById('reasonInput')||{}).value||'';if(!v.trim()){toast('Add a brief reason','var(--amber)');return;}revoke(id,v.trim());}
let editRows=null;
function startEdit(id){const o=orders.find(x=>x.id===id);editId=id;editRows=o.lines.map(l=>({sku:l.sku,name:l.name,price:l.price,qty:l.qty,loc:l.loc,itemId:l.itemId}));renderDrawer();}
function cancelEdit(){editId=null;editRows=null;renderDrawer();}
function syncEditInputs(){editRows.forEach((r,i)=>{const q=document.getElementById('eq'+i),p=document.getElementById('ep'+i);if(q)r.qty=Math.max(0,Math.floor(+q.value||0));if(p)r.price=Math.max(0,+p.value||0);});}
function editLineTable(o){
 const inOrder=new Set(editRows.map(r=>r.sku)),avail=CATALOG.filter(c=>!inOrder.has(c.sku));
 const sub=editRows.reduce((s,r)=>s+r.price*r.qty,0),gst=Math.round(sub*.18);
 return `<div class="block"><h3>Edit &amp; approve <span class="hint">qty / rate, remove, or add a SKU the dealer asked for</span></h3>
 <table><thead><tr><th>Product</th><th class="r">Qty</th><th class="r">Rate</th><th class="r">Amount</th><th></th></tr></thead>
 <tbody>${editRows.map((r,i)=>`<tr><td><div class="pn">${r.name}</div><div class="sku">${r.sku}</div></td><td class="r"><input class="ein" type="number" min="0" step="1" value="${r.qty}" id="eq${i}" oninput="recalcEdit()"></td><td class="r"><input class="ein" type="number" min="0" step="1" value="${r.price}" id="ep${i}" oninput="recalcEdit()"></td><td class="r" id="ea${i}">${fmt(r.price*r.qty)}</td><td class="r"><button class="erm" title="Remove" onclick="removeEditRow(${i})">\u2715</button></td></tr>`).join('')}</tbody>
 <tfoot><tr><td colspan="3" class="r">Subtotal</td><td class="r" id="eSub">${fmt(sub)}</td><td></td></tr><tr><td colspan="3" class="r">GST 18%</td><td class="r" id="eGst">${fmt(gst)}</td><td></td></tr><tr class="grand"><td colspan="3" class="r">New total</td><td class="r" id="eTot">${fmt(sub+gst)}</td><td></td></tr></tfoot></table>
 ${avail.length?`<div class="addrow"><select class="ein addsel" id="addSku">${avail.map(c=>`<option value="${c.sku}">${c.name} \u00b7 ${fmt(c.price)}</option>`).join('')}</select><input class="ein" type="number" min="1" step="1" value="1" id="addQty"><button class="btn ghost" onclick="addEditRow()">+ Add line</button></div>`:`<div class="rfnote" style="margin-top:10px">Every catalogue SKU is already on this order.</div>`}
 </div>
 <div class="actions" style="margin-top:14px"><button class="btn green" onclick="commitEdit('${o.id}')">Approve with changes</button><button class="btn ghost" onclick="cancelEdit()">Cancel</button></div>`;}
function recalcEdit(){let sub=0;editRows.forEach((r,i)=>{const q=Math.max(0,Math.floor(+(document.getElementById('eq'+i).value||0))),p=Math.max(0,+(document.getElementById('ep'+i).value||0)),amt=q*p;sub+=amt;const a=document.getElementById('ea'+i);if(a)a.textContent=fmt(amt);});const gst=Math.round(sub*.18);document.getElementById('eSub').textContent=fmt(sub);document.getElementById('eGst').textContent=fmt(gst);document.getElementById('eTot').textContent=fmt(sub+gst);}
function addEditRow(){syncEditInputs();const sku=document.getElementById('addSku').value,qty=Math.max(1,Math.floor(+(document.getElementById('addQty').value||1))),c=CATALOG.find(x=>x.sku===sku);if(!c)return;editRows.push({sku:c.sku,name:c.name,price:c.price,qty,loc:c.loc,itemId:c.itemId});renderDrawer();toast('Added '+c.name,'var(--blue)');}
function removeEditRow(i){syncEditInputs();editRows.splice(i,1);renderDrawer();}
function commitEdit(id){const o=orders.find(x=>x.id===id);syncEditInputs();
 const edits=editRows.filter(r=>r.qty>0).map(r=>({sku:r.sku,name:r.name,price:r.price,qty:r.qty,itemId:r.itemId}));
 if(!edits.length){toast('Add at least one line','var(--amber)');return;}
 o.lines=edits.map(e=>({sku:e.sku,name:e.name,price:e.price,qty:e.qty,loc:(CATALOG.find(c=>c.sku===e.sku)||{}).loc,itemId:e.itemId,serials:[]}));
 o.subtotal=o.lines.reduce((s,l)=>s+l.price*l.qty,0);o.gst=Math.round(o.subtotal*.18);o.total=o.subtotal+o.gst;o.edited=true;o.status='CREDIT_OK';
 persist(id,'editApprove',{lines:edits});editId=null;editRows=null;
 toast('Edited & approved \u2014 dealer, FOS & '+CITIES[CITY].wh+' notified','var(--green)');closeDrawer();refresh();}

/* ---- camera scanner (3rd capture method, production) ----
   Android/Chromium: native BarcodeDetector (verified to list code_128).
   iOS/Safari (no Barcode Detection API): self-hosted ZXing-WASM fallback.
   Locked to Code 128. Decodes the FULL (downscaled) frame so what you aim at on
   screen is what gets decoded — the reticle is only an aiming guide. Feeds the
   same addSerialValue() path + dedup + gate. Swap seam = detectFrame(). */
const WASM_BASE=new URL('vendor/zxing/',document.baseURI).href;   // works at root or subpath
const BUILD='v34L';                                                 // shown in the HUD to confirm you're on the new build
let camOrder=null,camSku=null,camStream=null,camTrack=null,camTimer=null,camBD=null,camZX=null,camEngine=null,camCool={},camStop=false,framesSeen=0,camHudT=null,camLastVal=null;
const camEl=id=>document.getElementById(id);
function camStatus(t,kind){const el=camEl('camStatus');if(!el)return;el.textContent=t;el.className='camstatus'+(kind?' '+kind:'');}
async function getZXing(){
 if(camZX)return camZX;
 const m=await import(WASM_BASE+'es/reader/index.js');
 m.setZXingModuleOverrides({locateFile:(p)=>p.endsWith('.wasm')?WASM_BASE+'zxing_reader.wasm':p});
 camZX=m;return m;
}
const WANT_BD=['code_128','code_39','code_93'];
const ACCEPT_FMT=new Set(['code128','code39','code93']); // serial-style linear; excludes numeric retail EAN/UPC
const normFmt=f=>String(f||'').toLowerCase().replace(/[^a-z0-9]/g,'');
let camSeen=null;
async function detectInit(){
 // Decide the engine once, up front, so load failures surface immediately.
 let bdOK=false,sup=[];
 try{if('BarcodeDetector' in window){sup=await BarcodeDetector.getSupportedFormats();bdOK=sup.includes('code_128');}}catch(e){}
 if(bdOK){camEngine='native';const use=WANT_BD.filter(f=>sup.includes(f));camBD=new BarcodeDetector({formats:use.length?use:['code_128']});return;}
 camEngine='wasm';
 const z=await getZXing();                       // throws → caught in openCamera
 await z.readBarcodes({data:new Uint8ClampedArray(4),width:1,height:1},{formats:['Code128']}).catch(()=>{}); // warm the wasm
}
async function detectFrame(canvas){
 if(camEngine==='native'){try{const r=await camBD.detect(canvas);return r.map(c=>({text:c.rawValue,format:c.format}));}catch(e){return [];}}
 try{const ctx=canvas.getContext('2d');const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const res=await camZX.readBarcodes(img,{formats:['Code128','Code39','Code93'],maxNumberOfSymbols:8,tryHarder:true,tryRotate:true});
  return res.map(x=>({text:x.text,format:x.format}));}catch(e){return [];}
}
function camMsg(t){camEl('camMsgText').textContent=t;camEl('camMsg').classList.add('show');}
function camTargetLabel(){const o=camOrder,l=o.lines.find(x=>x.sku===camSku);if(!l)return;
 camEl('camTarget').innerHTML=l.name+'<small>'+l.sku+' · Bin '+l.loc+'</small>';
 camEl('camCnt').textContent=l.serials.length+' / '+l.qty;}
function beep(){try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=1320;g.gain.value=.07;o.start();setTimeout(()=>{o.stop();a.close();},90);}catch(e){}if(navigator.vibrate)navigator.vibrate(40);}
function flashHit(){const r=camEl('camRetic');r.classList.add('hit');setTimeout(()=>r.classList.remove('hit'),260);}
function pushRecent(s){const el=camEl('camRecent');const c=document.createElement('span');c.className='rc';c.textContent='✓ '+s;el.prepend(c);while(el.children.length>4)el.lastChild.remove();}

async function openCamera(id){
 const o=orders.find(x=>x.id===id);if(!o)return;camOrder=o;
 const first=o.lines.find(l=>l.serials.length<l.qty);
 if(!first){toast('All units already serialized','var(--green)');return;}
 camSku=first.sku;camStop=false;framesSeen=0;
 camEl('camMsg').classList.remove('show');camEl('cam').classList.add('open');camTargetLabel();
 camEl('camManual').value='';
 if(!window.isSecureContext){camStatus('Needs HTTPS',' err');camMsg('The camera only works over HTTPS. Open the deployed site on the phone — not this preview frame. You can still type serials below.');return;}
 if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){camStatus('No camera API',' err');camMsg('This browser exposes no camera API. Use the hardware scanner or type serials below.');return;}
 camStatus('Requesting camera…');
 let v;
 try{
  camStream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}});
 }catch(e){
  const n=e&&e.name||'';
  camStatus('Camera blocked',' err');
  camMsg(n==='NotAllowedError'?'Camera permission was denied. Enable it for this site in your browser/Settings, then reopen. You can type serials below meanwhile.'
        :n==='NotFoundError'?'No camera found on this device. Use the hardware scanner or type serials below.'
        :'Could not start the camera ('+(n||'error')+'). Type serials below, or use the hardware scanner.');
  return;
 }
 v=camEl('camVideo');v.srcObject=camStream;v.muted=true;v.playsInline=true;v.setAttribute('playsinline','');
 try{ await v.play(); }
 catch(e){
  // iOS sometimes needs a second user tap to start playback.
  camStatus('Tap the screen to start',' err');
  const kick=async()=>{try{await v.play();camEl('cam').removeEventListener('click',kick);startScanning(v);}catch(_){}};
  camEl('cam').addEventListener('click',kick);
  return;
 }
 startScanning(v);
}
async function startScanning(v){
 camTrack=camStream.getVideoTracks()[0];
 try{await camTrack.applyConstraints({advanced:[{focusMode:'continuous'}]});}catch(e){}
 const cap=camTrack.getCapabilities?camTrack.getCapabilities():{};camEl('camTorch').style.display=cap.torch?'flex':'none';
 camStatus('Loading scanner…');
 try{ await detectInit(); }
 catch(e){ camStatus('Engine failed',' err'); camMsg('The scan engine failed to load ('+(e&&e.message||e)+'). Confirm /vendor/zxing is deployed. You can type serials below.'); return; }
 loopScan(v);
 hud();
 // Heartbeat: if no frames are processed after 3s, the video isn't delivering.
 setTimeout(()=>{ if(!camStop && framesSeen===0) camStatus('No camera frames — tap to retry',' err'); },3000);
}
function hud(){
 if(camStop)return;
 const last=camLastVal?('…'+String(camLastVal).slice(-5)):'none';
 camStatus(BUILD+'·'+camEngine+'·'+framesSeen+'f · seen:'+(camSeen||'none')+' · last:'+last,'ok');
 camHudT=setTimeout(hud,400);
}
function loopScan(v){
 const work=document.createElement('canvas');const wctx=work.getContext('2d',{willReadFrequently:true});
 const dbg=camEl('camDebug');const dctx=dbg?dbg.getContext('2d'):null;
 const tick=async()=>{
  if(camStop||!camStream)return;
  if(v.videoWidth && v.readyState>=2){
   // High-res CENTER CROP (the band you aim at) — many more pixels per bar than a downscaled full frame.
   const vw=v.videoWidth,vh=v.videoHeight;
   const cw=Math.round(vw*0.92),ch=Math.round(vh*0.5),sx=Math.round((vw-cw)/2),sy=Math.round((vh-ch)/2);
   const long=Math.max(cw,ch),scale=Math.min(1,1600/long);
   const w=Math.round(cw*scale),h=Math.round(ch*scale);
   work.width=w;work.height=h;wctx.drawImage(v,sx,sy,cw,ch,0,0,w,h);
   framesSeen++;
   if(dctx){dbg.width=120;dbg.height=Math.round(120*h/w);dctx.drawImage(work,0,0,dbg.width,dbg.height);} // shows EXACTLY what the decoder sees
   const detected=await detectFrame(work);
   for(const d of detected){
    camSeen=normFmt(d.format).replace('code','c')+'·'+String(d.text).slice(-5); // e.g. c128·A492
    if(ACCEPT_FMT.has(normFmt(d.format))) handleScan(d.text);
   }
  }
  camTimer=setTimeout(tick, camEngine==='wasm'?170:80);
 };tick();
}
function commitCamSerial(val){
 camLastVal=val;
 const line=camOrder.lines.find(l=>l.sku===camSku);const before=line.serials.length;
 if(!addSerialValue(camOrder.id,camSku,val))return;
 if(line.serials.length>before){beep();flashHit();pushRecent(val);}
 if(line.serials.length>=line.qty){const nxt=camOrder.lines.find(x=>x.serials.length<x.qty);
  if(nxt){camSku=nxt.sku;camTargetLabel();}else{toast('All '+unitCount(camOrder)+' serials captured','var(--green)');closeCamera();return;}
 } else camTargetLabel();
}
function handleScan(raw){
 const val=normalizeScan(raw);if(!val)return;
 if(camCool[val]&&Date.now()-camCool[val]<1500)return;camCool[val]=Date.now();
 ingestScanCam(val);
}
function camManualAdd(){
 const inp=camEl('camManual');const val=normalizeScan(inp.value);inp.value='';
 if(!val)return;
 if(camCool[val]&&Date.now()-camCool[val]<1500){inp.focus();return;}camCool[val]=Date.now();
 ingestScanCam(val);inp.focus();
}
function toggleTorch(){if(!camTrack)return;const btn=camEl('camTorch');const on=!btn.classList.contains('on');
 camTrack.applyConstraints({advanced:[{torch:on}]}).then(()=>btn.classList.toggle('on',on)).catch(()=>{});}
function closeCamera(){
 camStop=true;
 if(camTimer){clearTimeout(camTimer);camTimer=null;}
 if(camHudT){clearTimeout(camHudT);camHudT=null;}
 if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
 camTrack=null;camCool={};camEl('camRecent').innerHTML='';
 camEl('cam').classList.remove('open');
 if(selectedId)renderDrawer();
}
document.addEventListener('visibilitychange',()=>{if(document.hidden&&camStream)closeCamera();});
window.addEventListener('pagehide',()=>{if(camStream)closeCamera();});

let SESSION=null,loginEmail='';
function lerr(t){document.getElementById('loginError').textContent=t||'';}
function showLogin(){document.getElementById('login').classList.add('show');setTimeout(()=>document.getElementById('loginEmail').focus(),60);}
function hideLogin(){document.getElementById('login').classList.remove('show');}
function backToEmail(){document.getElementById('loginStep2').style.display='none';document.getElementById('loginStep1').style.display='block';lerr('');}
async function requestOtp(){
 const email=document.getElementById('loginEmail').value.trim();
 if(!email){lerr('Enter your work email');return;}
 loginEmail=email;const b=document.getElementById('loginSendBtn');b.disabled=true;lerr('');
 if(DEMO_MODE){document.getElementById('loginEmailEcho').textContent=email;document.getElementById('loginStep1').style.display='none';document.getElementById('loginStep2').style.display='block';setTimeout(()=>document.getElementById('loginCode').focus(),60);return;}
 try{await fetch('/.netlify/functions/auth-request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});}catch(e){}
 b.disabled=false;
 document.getElementById('loginEmailEcho').textContent=email;
 document.getElementById('loginStep1').style.display='none';
 document.getElementById('loginStep2').style.display='block';
 setTimeout(()=>document.getElementById('loginCode').focus(),60);
}
async function verifyOtp(){
 const code=document.getElementById('loginCode').value.trim();
 if(code.length<6){lerr('Enter the 6-digit code');return;}
 if(DEMO_MODE){const role=document.getElementById('demoRole').value,city=document.getElementById('demoCity').value;hideLogin();applySession({name:(role==='warehouse'?'Warehouse':'Accounts')+' (demo)',role,city,email:loginEmail});return;}
 const b=document.getElementById('loginVerifyBtn');b.disabled=true;lerr('');
 try{
  const r=await fetch('/.netlify/functions/auth-verify',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:loginEmail,code})});
  if(!r.ok){lerr(await r.text()||'Sign-in failed');b.disabled=false;return;}
  const j=await r.json();hideLogin();applySession(j.session);
 }catch(e){lerr('Network error — try again');b.disabled=false;}
}
function applySession(s){
 SESSION=s;ROLE=s.role;CITY=s.city;FILTER='all';
 document.getElementById('cityLabel').textContent=s.city;
 document.getElementById('whoAv').classList.toggle('wh',s.role==='warehouse');
 document.body.classList.add('prod');           // hide role switch + lock city
 identity();refresh();if(!DEMO_MODE)reloadFromServer();
}
async function doLogout(){
 if(DEMO_MODE){if(DEMO_LOGIN){document.body.classList.remove('prod');backToEmail();document.getElementById('loginCode').value='';showLogin();}else{toast('Sign-out is disabled in demo','var(--label3)');}return;}
 try{await fetch('/.netlify/functions/auth-logout',{method:'POST',credentials:'include'});}catch(e){}
 location.reload();
}

/* ---- boot + PWA ---- */
function boot(){
 if(DEMO_MODE){identity();refresh();if(DEMO_LOGIN){document.getElementById('loginDemo').style.display='block';showLogin();}return;}
 fetch('/.netlify/functions/auth-me',{credentials:'include'})
  .then(r=>{if(r.ok)return r.json();throw 0;})
  .then(s=>applySession(s))
  .catch(()=>{identity();refresh();showLogin();});
}
boot();
if('serviceWorker' in navigator && location.protocol==='https:'){
 window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
