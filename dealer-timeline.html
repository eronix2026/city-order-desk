<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ERONIX · Your Orders</title>
<style>
  :root{
    --bg:#f5f5f7;--surface:#fff;--label:#1d1d1f;--label2:rgba(60,60,67,.6);--label3:rgba(60,60,67,.45);
    --sep:rgba(60,60,67,.16);--blue:#007AFF;--green:#34C759;--amber:#FF9500;--red:#FF3B30;--purple:#AF52DE;--teal:#30B0C7;
    --g-blue:#0E7C8C;--g-green:#248A3D;--g-deep:#0E7A4B;--g-amber:#B25000;--g-red:#C9241B;--g-purple:#8944AB;--g-yellow:#8A6D00;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--label);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;padding:22px 16px max(22px,env(safe-area-inset-bottom))}
  .wrap{max-width:560px;margin:0 auto}
  .hdr{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:0 0 4px}
  .sub{font-size:13px;color:var(--label2);margin:0 0 20px}
  .ocard{background:var(--surface);border:.5px solid var(--sep);border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .otop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .oid{font-size:15px;font-weight:700}
  .osrc{font-size:11px;color:var(--label2);margin-top:2px;display:flex;align-items:center;gap:6px}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .dot.unolo{background:var(--blue)}.dot.dealer{background:var(--purple)}
  .oamt{font-size:16px;font-weight:700;text-align:right;white-space:nowrap}
  .ost{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:7px;white-space:nowrap;margin-top:5px;display:inline-block}
  .st-review{background:rgba(0,122,255,.12);color:var(--g-blue)}
  .st-hold,.st-revise{background:rgba(255,149,0,.14);color:var(--g-amber)}
  .st-reject{background:rgba(255,59,48,.14);color:var(--g-red)}
  .st-approved{background:rgba(52,199,89,.16);color:var(--g-green)}
  .st-invoiced,.st-packed{background:rgba(0,122,255,.12);color:var(--g-blue)}
  .st-transit{background:rgba(48,176,199,.16);color:var(--g-blue)}
  .st-delivered{background:rgba(13,124,72,.15);color:var(--g-deep)}
  .olines{font-size:12.5px;color:var(--label2);margin:13px 0 4px;line-height:1.5}
  .tl{position:relative;padding-left:24px;margin-top:16px}
  .tl::before{content:'';position:absolute;left:7px;top:7px;bottom:7px;width:2px;background:var(--sep)}
  .ev{position:relative;padding-bottom:15px}.ev:last-child{padding-bottom:0}
  .ev .d{position:absolute;left:-24px;top:1px;width:16px;height:16px;border-radius:50%;background:var(--surface);border:2px solid var(--label3);display:flex;align-items:center;justify-content:center}
  .ev .d svg{width:9px;height:9px}
  .ev.k-held .d,.ev.k-revised .d{background:var(--amber);border-color:var(--amber)}
  .ev.k-rejected .d{background:var(--red);border-color:var(--red)}
  .ev.k-approved .d{background:var(--green);border-color:var(--green)}
  .ev.k-placed .d{background:var(--blue);border-color:var(--blue)}
  .ev.k-packed .d{background:var(--purple);border-color:var(--purple)}
  .ev.k-invoiced .d,.ev.k-eway .d{background:var(--blue);border-color:var(--blue)}
  .ev.k-dispatched .d{background:var(--teal);border-color:var(--teal)}
  .ev.k-delivered .d{background:#0E7A4B;border-color:#0E7A4B}
  .ev .t{font-size:13.5px;font-weight:600}
  .ev.k-held .t,.ev.k-revised .t{color:var(--g-amber)}.ev.k-rejected .t{color:var(--g-red)}
  .ev .n{font-size:12px;color:var(--label2);margin-top:2px}
  .ev .ts{font-size:11px;color:var(--label3);margin-top:3px;font-variant-numeric:tabular-nums}
  .empty{background:var(--surface);border:.5px dashed var(--sep);border-radius:16px;padding:34px 18px;text-align:center;color:var(--label3);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="hdr">Your orders</h1>
  <p class="sub">Every order placed for you — by your field officer or by you in Dealer OS — tracked end to end.</p>
  <div id="orders"></div>
</div>

<script>
/* ── ERONIX Dealer OS · order timeline renderer ───────────────────────────────
   Integration (production):
     1. Your Dealer OS backend proxies the desk bridge, server-side:
          GET https://orders.eronix.in/.netlify/functions/dealer-orders?gstin=<dealer GSTIN>
          header  X-Dealer-Secret: <DEALER_WEBHOOK_SECRET>
        Expose it to the signed-in dealer as e.g.  GET /api/order-timeline
        (never call the desk bridge from the browser — the secret stays server-side).
     2. Fetch + render:
          const res = await fetch('/api/order-timeline');
          const data = await res.json();
          renderDealerOrders(document.getElementById('orders'), data.orders);
   The demo dataset below renders this file standalone for design review.        */

const INR = n => '₹' + (n||0).toLocaleString('en-IN');
const fmtTs = ts => { const d=new Date(ts); return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true}); };
const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><path d="M5 13l4 4L19 7"/></svg>';

function statusClass(label){
  const l=(label||'').toLowerCase();
  if(l.includes('revision'))return 'st-revise';
  if(l.includes('review'))return 'st-review';
  if(l.includes('hold'))return 'st-hold';
  if(l.includes('not approved'))return 'st-reject';
  if(l.includes('approved'))return 'st-approved';
  if(l.includes('packed'))return 'st-packed';
  if(l.includes('invoiced'))return 'st-invoiced';
  if(l.includes('transit'))return 'st-transit';
  if(l.includes('delivered'))return 'st-delivered';
  return 'st-review';
}

function renderTimeline(events){
  return `<div class="tl">${(events||[]).map(e=>`
    <div class="ev k-${e.key}">
      <div class="d">${CHECK}</div>
      <div class="t">${e.label}</div>
      ${e.note?`<div class="n">${e.note}</div>`:''}
      <div class="ts">${fmtTs(e.at)}</div>
    </div>`).join('')}</div>`;
}

function renderOrder(o){
  const lines=(o.lines||[]).map(l=>`${l.qty}× ${l.name}`).join(' · ');
  return `<div class="ocard">
    <div class="otop">
      <div>
        <div class="oid">${o.id}</div>
        <div class="osrc"><span class="dot ${o.source}"></span>${o.placedVia||(o.source==='dealer'?'Dealer OS':'Unolo')}</div>
      </div>
      <div><div class="oamt">${INR(o.amount)}</div><span class="ost ${statusClass(o.statusLabel)}">${o.statusLabel}</span></div>
    </div>
    <div class="olines">${lines}${o.invoiceNo?` &nbsp;·&nbsp; Invoice ${o.invoiceNo}`:''}${o.dispatch&&o.dispatch.ref?` &nbsp;·&nbsp; ${o.dispatch.provider} ${o.dispatch.ref}`:''}</div>
    ${renderTimeline(o.timeline)}
  </div>`;
}

function renderDealerOrders(el, orders){
  if(!orders||!orders.length){ el.innerHTML=`<div class="empty">No orders yet. Orders placed by your field officer or in Dealer OS will appear here.</div>`; return; }
  el.innerHTML = orders.map(renderOrder).join('');
}

/* ── demo dataset (mirrors the desk bridge response shape) ─────────────────── */
const now=Date.now(),h=3600000;
const DEMO=[
  {id:'ERX-501',source:'unolo',placedVia:'Field officer (Unolo)',placedAt:now-10*h,statusLabel:'In transit',
   lines:[{sku:'EUPH-ANC-BLK',name:'Euphoria ANC',qty:20,price:2499}],amount:58982,invoiceNo:'INV/26/4412',
   dispatch:{type:'interstate',provider:'Delhivery',ref:'1248839201'},
   timeline:[
     {key:'placed',label:'Order placed',at:now-10*h,note:'Booked by field officer (Unolo)'},
     {key:'held',label:'Order on hold',at:now-9*h,note:'Pending invoices unsettled'},
     {key:'approved',label:'Order approved',at:now-7*h,note:'Approved with revisions'},
     {key:'packed',label:'Packed & verified',at:now-5*h,note:null},
     {key:'invoiced',label:'Invoice raised',at:now-4*h,note:'INV/26/4412'},
     {key:'eway',label:'E-way bill generated',at:now-3.5*h,note:'181400235567'},
     {key:'dispatched',label:'Dispatched',at:now-2*h,note:'Delhivery · 1248839201'},
   ]},
  {id:'ERX-D-77',source:'dealer',placedVia:'Dealer OS (self-placed)',placedAt:now-30*h,statusLabel:'Not approved',
   lines:[{sku:'GAN3-65W',name:'GaN 65W charger',qty:5,price:1999}],amount:11794,
   timeline:[
     {key:'placed',label:'Order placed',at:now-30*h,note:'Self-placed via Dealer OS'},
     {key:'rejected',label:'Order not approved',at:now-29*h,note:'Duplicate of ERX-D-71'},
   ]},
  {id:'ERX-D-83',source:'dealer',placedVia:'Dealer OS (self-placed)',placedAt:now-2*h,statusLabel:'Under review',
   lines:[{sku:'QMAG-PB-10K',name:'QMag Power Bank 10K',qty:8,price:2999}],amount:28311,
   timeline:[{key:'placed',label:'Order placed',at:now-2*h,note:'Self-placed via Dealer OS'}]},
];
renderDealerOrders(document.getElementById('orders'), DEMO);
</script>
</body>
</html>
