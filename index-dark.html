<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ERONIX Dealer OS · City Order Desk</title>
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#0a0a0b" />
<meta name="color-scheme" content="dark" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Order Desk" />
<link rel="icon" href="/icons/favicon-64.png" />
<style>
/* ===== Locked ERONIX Dealer OS design system ===== */
:root{--bg:#000;--surface:#121214;--surface2:#1a1a1d;--label:#f5f5f7;--label2:#98989d;--label3:#636366;--label4:#48484a;
 --sep:rgba(255,255,255,.09);--sep2:rgba(255,255,255,.055);--blue:#0a84ff;
 --green:#30d158;--amber:#ff9f0a;--yellow:#ffd60a;--red:#ff453a;--purple:#bf5af2;--teal:#64d2ff;
 --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Helvetica Neue",sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--label);font-family:var(--font);letter-spacing:-.014em;line-height:1.5;}
a,button{color:inherit;text-decoration:none;font-family:inherit;}
button{cursor:pointer;border:none;background:none}
::selection{background:rgba(10,132,255,.25)}

.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh;min-height:100svh;}
.side{position:sticky;top:0;height:100vh;height:100svh;border-right:.5px solid var(--sep);padding:26px 18px;display:flex;flex-direction:column;background:#070708;}
.side .logo{font-weight:800;letter-spacing:.16em;font-size:16px;margin:4px 8px 4px;}
.side .logo .os{display:block;font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--label3);margin-top:3px;}
.nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--label4);font-weight:600;padding:0 13px;margin:24px 0 8px;}
.nav-section-label:first-of-type{margin-top:30px}
.nav{display:flex;flex-direction:column;gap:3px;}
.nav a{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;font-size:14px;font-weight:500;color:var(--label2);transition:background .2s,color .2s;cursor:pointer;}
.nav a:hover{color:var(--label);background:rgba(255,255,255,.04);}
.nav a.on{color:#fff;background:rgba(255,255,255,.08);}
.nav a svg{width:17px;height:17px;flex:none;opacity:.9;}
.nav a span.tx{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav a .ct{font-size:11px;font-weight:600;color:var(--label3);background:rgba(255,255,255,.06);padding:1px 8px;border-radius:999px;min-width:22px;text-align:center}
.nav a.on .ct{color:#fff;background:rgba(255,255,255,.16)}
.side .who{margin-top:auto;padding:13px;border-radius:13px;background:rgba(255,255,255,.03);border:.5px solid var(--sep2);}
.side .who .top{display:flex;align-items:center;gap:10px}
.side .who .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;color:#fff;background:linear-gradient(135deg,var(--blue),#0a64c8);flex:none}
.side .who .av.wh{background:linear-gradient(135deg,var(--purple),#8e3bbf)}
.side .who .nm{font-size:13px;font-weight:600;}
.side .who .gs{font-size:11px;color:var(--label3);margin-top:1px;letter-spacing:.01em;}
.side .who .out{display:block;width:100%;margin-top:11px;padding:8px;border-radius:9px;font-size:12px;font-weight:600;color:var(--label2);background:rgba(255,255,255,.04);transition:.2s}
.side .who .out:hover{color:var(--label);background:rgba(255,255,255,.08)}

.main{padding:30px 40px 60px;min-width:0;}
.dos-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:26px;}
.dos-greeting{font-size:24px;font-weight:700;letter-spacing:-.02em;}
.dos-greeting-sub{font-size:13.5px;color:var(--label3);margin-top:4px;}
.head-right{display:flex;align-items:center;gap:10px}
.dos-territory-pill{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--label);background:var(--surface);border:.5px solid var(--sep);border-radius:999px;padding:9px 15px;cursor:pointer;transition:.2s;position:relative}
.dos-territory-pill:hover{border-color:rgba(255,255,255,.2)}
.dos-territory-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.dos-territory-pill .chev{color:var(--label3);font-size:9px}
.sim{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--label2);background:var(--surface);border:.5px dashed var(--sep);border-radius:999px;padding:9px 14px;transition:.2s}
.sim:hover{color:var(--teal);border-color:var(--teal)}
.citymenu{position:absolute;top:46px;right:0;background:var(--surface2);border:.5px solid var(--sep);border-radius:14px;padding:6px;min-width:200px;box-shadow:0 24px 60px rgba(0,0,0,.6);display:none;z-index:40}
.citymenu.open{display:block}
.citymenu button{display:flex;align-items:center;justify-content:space-between;width:100%;font-size:13px;font-weight:500;padding:10px 12px;border-radius:9px;color:var(--label2)}
.citymenu button:hover{background:rgba(255,255,255,.05);color:var(--label)}
.citymenu button.sel{color:#fff}
.citymenu button .c{font-size:11px;color:var(--label3);background:rgba(255,255,255,.06);padding:2px 8px;border-radius:999px}
.citymenu button.sel .c{background:rgba(10,132,255,.22);color:var(--teal)}

.dos-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:26px;}
.dos-stat-cell{background:var(--surface);border:.5px solid var(--sep);border-radius:18px;padding:16px 18px;}
.dos-stat-label{font-size:12px;color:var(--label3);display:flex;align-items:center;gap:7px}
.dos-stat-label .sw{width:7px;height:7px;border-radius:2px}
.dos-stat-val{font-size:27px;font-weight:700;margin-top:8px;letter-spacing:-.02em;line-height:1}

.card{background:var(--surface);border:.5px solid var(--sep);border-radius:20px;padding:20px;}
.dos-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:14px;flex-wrap:wrap}
.dos-card-title{font-size:15px;font-weight:650;letter-spacing:-.01em}
.dos-card-sub{font-size:12.5px;color:var(--label3)}
.fbar{display:flex;gap:7px;flex-wrap:wrap}
.fchip{font-size:12px;font-weight:600;color:var(--label2);padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.05);transition:.18s}
.fchip:hover{color:var(--label)}
.fchip.on{color:#fff;background:var(--blue)}
.fchip .b{margin-left:6px;opacity:.75}

.qlist{margin-top:6px}
.qrow{display:grid;grid-template-columns:1fr auto;gap:6px 14px;padding:16px 4px;border-top:.5px solid var(--sep2);cursor:pointer;transition:.15s;align-items:center}
.qrow:first-child{border-top:none}
.qrow:hover{background:rgba(255,255,255,.025);border-radius:12px;padding-left:12px;padding-right:12px}
.qrow .dealer{font-size:15px;font-weight:600;letter-spacing:-.01em}
.qrow .amt{font-size:15px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.qrow .sub{font-size:12px;color:var(--label3);grid-column:1}
.qrow .right{grid-column:2;display:flex;align-items:center;gap:10px;justify-self:end}
.qrow .age{font-size:11.5px;color:var(--label4)}
.pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:7px;white-space:nowrap}
.p-NEW,.p-ACCOUNTS_REVIEW{background:rgba(10,132,255,.16);color:var(--teal)}
.p-HELD{background:rgba(255,159,10,.16);color:var(--amber)}
.p-REJECTED{background:rgba(255,69,58,.16);color:var(--red)}
.p-CREDIT_OK{background:rgba(48,209,88,.16);color:var(--green)}
.p-PICKING{background:rgba(191,90,242,.16);color:var(--purple)}
.p-SERIALIZED{background:rgba(255,214,10,.16);color:var(--yellow)}
.p-INVOICED{background:rgba(10,132,255,.16);color:var(--blue)}
.p-DISPATCHED{background:rgba(100,210,255,.16);color:var(--teal)}
.p-DELIVERED{background:rgba(48,209,88,.16);color:var(--green)}
.flag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px}
.flag.over{color:var(--red);background:rgba(255,69,58,.14)}
.flag.sn{color:var(--yellow);background:rgba(255,214,10,.14)}
.srcb{font-size:10.5px;font-weight:600;letter-spacing:.005em;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;color:var(--label3)}
.srcb::before{content:"";width:6px;height:6px;border-radius:50%;flex:none}
.srcb.fos::before{background:#0a84ff}.srcb.dealer::before{background:#30d158}
.qempty{padding:48px 8px;text-align:center;color:var(--label3);font-size:13.5px;line-height:1.6}

.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.28s;z-index:50}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;height:100svh;width:580px;max-width:94vw;background:#0c0c0e;border-left:.5px solid var(--sep);transform:translateX(100%);transition:transform .32s cubic-bezier(.22,.8,.22,1);z-index:55;overflow-y:auto;}
.drawer.open{transform:translateX(0)}
.dwrap{padding:24px 28px 40px}
.dclose{position:absolute;top:22px;right:24px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:var(--label2);font-size:15px;transition:.2s}
.dclose:hover{background:rgba(255,255,255,.12);color:#fff}
.dhead h1{font-size:21px;font-weight:700;letter-spacing:-.02em;padding-right:40px}
.dmeta{font-size:12.5px;color:var(--label3);margin-top:8px;display:flex;flex-wrap:wrap;gap:5px 14px}
.dmeta b{color:var(--label2);font-weight:600}
.dtotal{display:flex;align-items:baseline;gap:10px;margin:18px 0 6px}
.dtotal .v{font-size:28px;font-weight:750;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.dtotal .l{font-size:12px;color:var(--label3)}

.block{background:var(--surface);border:.5px solid var(--sep);border-radius:18px;padding:18px 20px;margin-top:16px}
.block h3{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--label3);margin-bottom:14px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:10px}
.block h3 .hint{text-transform:none;letter-spacing:0;font-weight:500;color:var(--label4);font-size:11px}

.credit{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.credit .l{font-size:11.5px;color:var(--label3);margin-bottom:5px}
.credit .v{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.meter{height:7px;background:rgba(255,255,255,.07);border-radius:999px;margin-top:15px;overflow:hidden}
.meter i{display:block;height:100%;border-radius:999px;transition:.5s}
.cnote{margin-top:12px;font-size:12.5px;display:flex;gap:8px;line-height:1.45}
.cnote.ok{color:var(--green)}.cnote.warn{color:var(--amber)}.cnote.bad{color:var(--red)}
.csrc{font-size:11px;color:var(--label4);margin-top:9px}

table{width:100%;border-collapse:collapse}
thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--label3);text-align:left;padding:0 0 10px;font-weight:600}
thead th.r,tbody td.r,tfoot td.r{text-align:right;font-variant-numeric:tabular-nums}
tbody td{padding:10px 0;border-top:.5px solid var(--sep2);font-size:13.5px}
tbody td .pn{font-weight:550}
tbody td .sku{font-size:11px;color:var(--label3)}
tfoot td{padding:10px 0 0;font-size:13px;color:var(--label3)}
tfoot td.r{font-weight:600;color:var(--label2)}
tfoot tr.grand td{border-top:.5px solid var(--sep);padding-top:12px;font-size:16px;font-weight:750;color:var(--label)}

/* ===== serial capture ===== */
.serline{padding:15px 0;border-top:.5px solid var(--sep2)}
.scanhint{font-size:11.5px;color:var(--teal);background:rgba(100,210,255,.08);border:.5px solid rgba(100,210,255,.18);border-radius:9px;padding:8px 11px;margin-bottom:6px;display:flex;align-items:center;gap:7px;line-height:1.35}
.zline{font-size:11.5px;color:var(--green);background:rgba(48,209,88,.08);border:.5px solid rgba(48,209,88,.2);border-radius:9px;padding:8px 11px;margin-bottom:8px;line-height:1.4;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ztoggle{margin-left:auto;font-size:10.5px;font-weight:700;letter-spacing:.03em;color:var(--label3);background:rgba(255,255,255,.06);border-radius:999px;padding:3px 10px}
.ztoggle.on{color:#04210d;background:var(--green)}
.zok{color:var(--green);font-weight:600}
.zwarn{color:var(--amber);font-weight:600}
.zsample{font-size:11px;color:var(--label3);margin-top:8px}
.zsample code{color:var(--teal);background:rgba(100,210,255,.1);border-radius:5px;padding:2px 7px;margin-left:4px;cursor:pointer;font-variant-numeric:tabular-nums}
.zsample code:hover{background:rgba(100,210,255,.2)}
.serline:first-of-type{border-top:none;padding-top:2px}
.serhead{display:flex;align-items:center;justify-content:space-between;gap:10px}
.serhead .nm{font-size:13.5px;font-weight:600}
.serhead .lm{font-size:11px;color:var(--label3);margin-top:1px}
.serprog{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;padding:4px 11px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--label2);white-space:nowrap}
.serprog.done{background:rgba(48,209,88,.16);color:var(--green)}
.serbar{height:5px;background:rgba(255,255,255,.07);border-radius:999px;margin:11px 0;overflow:hidden}
.serbar i{display:block;height:100%;background:var(--purple);border-radius:999px;transition:.3s}
.serbar i.done{background:var(--green)}
.serscan{display:flex;gap:8px}
.serscan input{flex:1;background:var(--surface2);border:.5px solid var(--sep);border-radius:10px;padding:10px 12px;color:var(--label);font-size:13px;font-family:inherit;letter-spacing:.02em}
.serscan input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(10,132,255,.18)}
.serscan .af{font-size:11.5px;font-weight:600;color:var(--label3);background:rgba(255,255,255,.05);border-radius:10px;padding:0 13px;white-space:nowrap;transition:.18s}
.serscan .af:hover{color:var(--teal)}
.rangefill{display:flex;gap:8px;margin-top:8px}
.rangefill input{flex:1;background:var(--surface2);border:.5px solid var(--sep);border-radius:10px;padding:9px 12px;color:var(--label2);font-size:12.5px;font-family:inherit;letter-spacing:.02em}
.rangefill input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(10,132,255,.18)}
.rangefill .af{font-size:11.5px;font-weight:600;color:var(--label3);background:rgba(255,255,255,.05);border-radius:10px;padding:0 13px;white-space:nowrap;transition:.18s}
.rangefill .af:hover{color:var(--teal)}
.rfnote{font-size:11px;color:var(--label3);margin-top:5px;line-height:1.4}
.serchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.serchip{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;background:var(--surface2);border:.5px solid var(--sep);border-radius:8px;padding:5px 9px;color:var(--label2)}
.serchip .n{color:var(--label4);font-weight:700}
.serchip .x{cursor:pointer;color:var(--label3);font-size:13px;line-height:1}
.serchip .x:hover{color:var(--red)}
.serchip.ro .x{display:none}
.serchip.ro{padding-right:9px}

.field{margin-bottom:13px}
.field label{display:block;font-size:11.5px;color:var(--label2);margin-bottom:6px;font-weight:600}
.field input,.field select{width:100%;background:var(--surface2);border:.5px solid var(--sep);border-radius:11px;padding:11px 13px;color:var(--label);font-size:13.5px;font-family:inherit}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(10,132,255,.18)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:13px}

.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{font-size:13.5px;font-weight:650;padding:12px 20px;border-radius:11px;transition:.16s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.wide{flex:1}
.btn.green{background:var(--green);color:#04210d}.btn.green:hover:not(:disabled){background:#3ee066}
.btn.purple{background:var(--purple);color:#fff}.btn.purple:hover:not(:disabled){background:#cb6ff5}
.btn.blue{background:var(--blue);color:#fff}.btn.blue:hover:not(:disabled){background:#2a96ff}
.btn.yellow{background:var(--yellow);color:#2a2200}.btn.yellow:hover:not(:disabled){background:#ffe04d}
.btn.ghost{background:rgba(255,255,255,.05);color:var(--label2)}.btn.ghost:hover{color:var(--label);background:rgba(255,255,255,.09)}
.btn.danger{background:rgba(255,69,58,.14);color:var(--red)}.btn.danger:hover{background:rgba(255,69,58,.22)}

.doneflag{display:flex;align-items:center;gap:10px;border-radius:12px;padding:13px 15px;font-size:13px;font-weight:600;line-height:1.4}
.doneflag.green{background:rgba(48,209,88,.12);border:.5px solid rgba(48,209,88,.25);color:var(--green)}
.doneflag.amber{background:rgba(255,159,10,.12);border:.5px solid rgba(255,159,10,.25);color:var(--amber)}
.doneflag.yellow{background:rgba(255,214,10,.1);border:.5px solid rgba(255,214,10,.25);color:var(--yellow)}

.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--sep)}
.tl{position:relative;padding-bottom:16px}.tl:last-child{padding-bottom:0}
.tl .dot{position:absolute;left:-24px;top:2px;width:16px;height:16px;border-radius:50%;background:var(--surface);border:2px solid var(--label3);display:flex;align-items:center;justify-content:center}
.tl.done .dot{background:var(--green);border-color:var(--green)}
.tl .t{font-size:13px;font-weight:600}.tl.pending .t{color:var(--label3);font-weight:500}
.tl .s{font-size:11.5px;color:var(--label3);margin-top:2px}
.tlts{font-size:11px;color:var(--label4);margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:.01em}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:.5px solid var(--sep);border-radius:13px;padding:13px 20px;font-size:13.5px;font-weight:600;box-shadow:0 20px 50px rgba(0,0,0,.6);opacity:0;transition:.32s cubic-bezier(.2,.8,.2,1);z-index:80;display:flex;align-items:center;gap:10px;pointer-events:none}
.login{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px}
.login.show{display:flex}
.loginbox{width:100%;max-width:360px}
.loginlogo{font-weight:800;letter-spacing:.16em;font-size:20px;text-align:center;margin-bottom:30px}
.loginlogo span{display:block;font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--label3);margin-top:6px}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:12px;color:var(--label2);margin-bottom:7px;font-weight:600}
.lfield input{width:100%;background:var(--surface2);border:.5px solid var(--sep);border-radius:12px;padding:13px 14px;color:var(--label);font-size:15px;font-family:inherit}
.lfield input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(10,132,255,.18)}
#loginCode{letter-spacing:.4em;text-align:center;font-variant-numeric:tabular-nums;font-size:20px}
.lerror{font-size:12.5px;color:var(--red);margin-top:12px;text-align:center;min-height:16px}
.llink{display:block;width:100%;margin-top:12px;font-size:12.5px;color:var(--label3);background:none}
.llink:hover{color:var(--label)}
body.prod #deskLabel,body.prod #navRole{display:none}
body.prod .dos-territory-pill .chev{display:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast .ic{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex:none}

@media (max-width:1080px){.dos-stats{grid-template-columns:repeat(3,1fr)}}
.mobnav{display:none}
.sidebd{display:none}
@media (max-width:820px){
  .shell{grid-template-columns:1fr}

];
const DEALERS={
 Kolkata:[{name:'Galaxy Mobiles',code:'ERX-KOL-014',gstin:'19AABCG1234K1Z5',limit:200000,outstanding:64000},{name:'Sound Hub Salt Lake',code:'ERX-KOL-031',gstin:'19AAACS9087L1Z2',limit:150000,outstanding:141000},{name:'TechZone Gariahat',code:'ERX-KOL-008',gstin:'19AADCT4521M1Z8',limit:300000,outstanding:88000}],
 Mumbai:[{name:'Crescent Electronics',code:'ERX-MUM-022',gstin:'27AAFCC7766P1Z1',limit:400000,outstanding:120000},{name:'Andheri Gadget Bazaar',code:'ERX-MUM-045',gstin:'27AAGCA1290Q1Z9',limit:250000,outstanding:240000}],
 Delhi:[{name:'Nehru Place Digital',code:'ERX-DEL-003',gstin:'07AAHCN5512R1Z4',limit:500000,outstanding:175000},{name:'Lajpat Audio Co',code:'ERX-DEL-027',gstin:'07AAJCL3398S1Z7',limit:200000,outstanding:52000}],
 Bangalore:[{name:'SP Road Imports',code:'ERX-BLR-011',gstin:'29AAKCS8821T1Z3',limit:350000,outstanding:95000},{name:'Koramangala Tech',code:'ERX-BLR-038',gstin:'29AALCK6677U1Z0',limit:180000,outstanding:166000}],
 Chennai:[{name:'Ritchie Street Mobiles',code:'ERX-CHN-006',gstin:'33AAMCR4455V1Z6',limit:300000,outstanding:71000},{name:'T Nagar Electronics',code:'ERX-CHN-019',gstin:'33AANCT2103W1Z2',limit:220000,outstanding:48000}],
};
const EXECS={Kolkata:['Sourav B.','Debjit M.'],Mumbai:['Rahul K.','Faizan A.'],Delhi:['Amit S.','Gaurav T.'],Bangalore:['Naveen R.','Manoj P.'],Chennai:['Karthik S.','Vignesh R.']};

/* ---- serial-number architecture (MC ▸ OC ▸ primary) ----
   Primary: ERX<ITEM4><YYWW><SEQ7><C>  ·  OC: OC<ITEM4><YYWW><SEQ5><C>  ·  MC: MC<ITEM4><YYWW><SEQ4><C>
   Namespace classifies the level; GS1 mod-10 check digit guards against mis-keys.
   Only PRIMARY serials are ever sent to Zoho (cartons explode to primaries). */
const ITEM4={'EUPH-ANC-BLK':'EUAN','AURA-TWS-WHT':'AUTW','QMAG-PB-10K':'QM10','GAN3-65W':'GN65','GAN3-45W':'GN45','AVNT-CL-CBL':'AVCL','PDS-25W-ADP':'PD25','MAG3-STND':'MG3S'};
const PRIMARY_RE=/^ERX[A-Z0-9]{4}\d{12}$/,OC_RE=/^OC[A-Z0-9]{4}\d{10}$/,MC_RE=/^MC[A-Z0-9]{4}\d{9}$/;
function gs1Check(s){let sum=0;for(let i=0;i<s.length;i++)sum+=(+s[s.length-1-i])*(i%2===0?3:1);return (10-(sum%10))%10;}
function checkOk(c,d){const g=c.slice(d);return gs1Check(g.slice(0,-1))===+g.slice(-1);}
function classifyCode(code){const c=String(code||'').trim().toUpperCase();if(MC_RE.test(c))return checkOk(c,6)?'mc':'mc_bad';if(OC_RE.test(c))return checkOk(c,6)?'oc':'oc_bad';if(PRIMARY_RE.test(c))return checkOk(c,7)?'primary':'primary_bad';return 'unknown';}
const WW='2526'; // demo manufacturing batch (year 25, week 26)
function genPrimaryRaw(item,ww,n){const b=ww+String(n).padStart(7,'0');return 'ERX'+item+b+gs1Check(b);}
function genPrimary(sku,n){return genPrimaryRaw(ITEM4[sku]||'XXXX',WW,n);}
function genOCcode(sku,n){const b=WW+String(n).padStart(5,'0');return 'OC'+(ITEM4[sku]||'XXXX')+b+gs1Check(b);}
function genMCcode(sku,n){const b=WW+String(n).padStart(4,'0');return 'MC'+(ITEM4[sku]||'XXXX')+b+gs1Check(b);}
// Expand a contiguous run of primaries from a first serial (sealed carton / manual fallback).
function expandRangeCodes(start,count){
 const c=String(start||'').toUpperCase();if(classifyCode(c)!=='primary'||!(count>=1))return [];
 const item=c.slice(3,7),ww=c.slice(7,11),seq0=Number(c.slice(11,18));
 if(seq0+count-1>9999999)return [];
 const out=[];for(let i=0;i<count;i++)out.push(genPrimaryRaw(item,ww,seq0+i));return out;
}

let ROLE='accounts',CITY='Kolkata',FILTER='all',selectedId=null,orders=[],seq=1000;

/* ---- production API seam ----
   DEMO_MODE=true runs fully in-memory (this preview + offline demo).
   Flip to false once the staff session edge function is live; the portal then
   loads each desk's queue from orders.mjs and persists every action server-side. */
const PROD_HOSTS=['orderdesk.eronix.in','orders.eronix.in'];
const DEMO_INTENT=true;
const DEMO_MODE = DEMO_INTENT && !PROD_HOSTS.includes((location.hostname||'').toLowerCase());
const DEMO_LOGIN = DEMO_MODE;   // demo: real login screen + persona picker
const API='/.netlify/functions/orders';
async function apiLoad(){const r=await fetch(API,{credentials:'include'});if(!r.ok)throw new Error('load '+r.status);return (await r.json()).orders;}
async function apiAction(id,action,p){const r=await fetch(API,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,action,...(p||{})})});if(!r.ok)throw new Error(action+' '+r.status);return (await r.json()).order;}
function persist(id,action,p){if(DEMO_MODE)return Promise.resolve();return apiAction(id,action,p).catch(e=>toast('Sync failed — '+e.message,'var(--red)'));}
function reloadFromServer(){if(DEMO_MODE)return;apiLoad().then(o=>{orders=o;refresh();}).catch(()=>toast('Could not load queue','var(--red)'));}

/* ---- mobile sidebar ---- */
function toggleSide(){const s=document.getElementById('side');const b=document.getElementById('sideBd');const on=!s.classList.contains('open');s.classList.toggle('open',on);b.classList.toggle('open',on);}
function closeSide(){document.getElementById('side').classList.remove('open');document.getElementById('sideBd').classList.remove('open');}
const usedSerials=new Set(); // global anti-duplication (no S/N ships twice)
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a, pick=a=>a[rnd(0,a.length-1)];

let _seq={};
function snPrefix(sku){return (ITEM4[sku]||sku.replace(/[^A-Za-z0-9]/g,'').slice(0,4).toUpperCase());}
function genSerial(sku){let s;do{_seq[sku]=(_seq[sku]||0)+1;s=genPrimary(sku,_seq[sku]);}while(usedSerials.has(s));return s;}

/* ---- Zoho serial validation layer ----
   Every captured serial is checked against the in-stock serial pool Zoho holds
   for that exact item (items/serialnumbers). Prod: preloaded from /serial-pool
   when the order opens. Demo: a simulated per-SKU pool so accept/reject is real. */
let DEMO_ZOHO_STRICT=true;          // demo-only toggle; production validation is always on
const ZOHO_POOL={};                 // demo: sku -> [valid in-stock serials]
let zohoPool={};                    // prod: itemId -> Set(serials), from serial-pool.mjs
function buildZohoPool(){CATALOG.forEach(c=>{const arr=[];for(let n=1;n<=28;n++)arr.push(genPrimary(c.sku,n));ZOHO_POOL[c.sku]=arr;});}
buildZohoPool();
function poolPick(sku,exclude){const a=(ZOHO_POOL[sku]||[]).filter(s=>!exclude.has(s)&&!usedSerials.has(s));return a.length?a[rnd(0,a.length-1)]:genSerial(sku);}
function poolForLine(l){if(DEMO_MODE)return ZOHO_POOL[l.sku]||null;return (l.itemId&&zohoPool[l.itemId])?zohoPool[l.itemId]:null;}
function poolCount(l){const p=poolForLine(l);return p?(p.length!==undefined?p.length:p.size):null;}
function inZohoPool(l,serial){const p=poolForLine(l);if(!p)return null;return p.includes?p.includes(serial):p.has(serial);}
function strictZoho(){return !DEMO_MODE||DEMO_ZOHO_STRICT;}
function toggleZohoStrict(){DEMO_ZOHO_STRICT=!DEMO_ZOHO_STRICT;if(selectedId)renderDrawer();}

/* ---- carton aggregation (MC ▸ OC ▸ primary S/N) ----
   Scanning a master- or outer-carton label expands to every primary serial under
   it; each is still validated against the Zoho pool and capped to the line qty.
   Prod resolves via /aggregation; demo builds a hierarchy over each SKU's pool. */
const AGG={};
const OC_SIZE=4, MC_OCS=2;            // demo packing: 4 units/OC, 2 OCs/MC (8 units/MC)
function buildAgg(){
 Object.keys(ZOHO_POOL).forEach(sku=>{
  const pool=ZOHO_POOL[sku];const ocs=[];let oc=0,mc=0;
  for(let k=0;k<pool.length;k+=OC_SIZE){const code=genOCcode(sku,++oc);AGG[code]={type:'oc',sku,serials:pool.slice(k,k+OC_SIZE)};ocs.push(code);}
  for(let k=0;k<ocs.length;k+=MC_OCS){const code=genMCcode(sku,++mc);const childOcs=ocs.slice(k,k+MC_OCS);AGG[code]={type:'mc',sku,ocs:childOcs,serials:childOcs.flatMap(o=>AGG[o].serials)};}
 });
}
buildAgg();
async function aggResolve(code){
 if(DEMO_MODE){const n=AGG[code];return n?{type:n.type,sku:n.sku,serials:n.serials.slice()}:null;}
 try{const r=await fetch('/.netlify/functions/aggregation?code='+encodeURIComponent(code),{credentials:'include'});if(!r.ok)return null;const j=await r.json();return (j.type&&j.type!=='primary'&&Array.isArray(j.serials)&&j.serials.length)?{type:j.type,sku:j.sku,serials:j.serials}:null;}catch(e){return null;}
}
// A unit is available if it's in stock (Zoho pool) and not already on this order.
function unitAvailable(l,s,onOrder){
 if(onOrder.has(s))return false;
 if(DEMO_MODE)return (ZOHO_POOL[l.sku]||[]).includes(s)&&!usedSerials.has(s);
 return inZohoPool(l,s)!==false;     // pool excludes sold units; null (unloaded) → allow, server re-checks
}
// Master carton: only scanned when WHOLE and INTACT. Once a unit inside has been
// consumed (half-emptied), the MC is refused and the operator scans its OCs.
function captureCarton(orderId,node,code){
 const o=orders.find(x=>x.id===orderId),l=o.lines.find(x=>x.sku===node.sku);
 if(!l){toast('📦 '+code+' is '+node.sku+' — not on this order','var(--amber)');return 0;}
 const remaining=l.qty-l.serials.length;
 if(remaining<=0){toast(l.name+' is already fully serialized','var(--amber)');return 0;}
 const onOrder=new Set(o.lines.flatMap(x=>x.serials));
 const free=node.serials.filter(s=>unitAvailable(l,s,onOrder));
 if(node.type==='mc'){
  if(free.length<node.serials.length)return toastN('📦 Master carton '+code+' is already opened — scan its outer cartons (OC)');
  if(node.serials.length>remaining)return toastN('📦 '+code+' holds '+node.serials.length+' units — more than the '+remaining+' this order needs. Scan outer cartons (OC)');
  return commitCartonSerials(o,l,free,code,'Master carton');
 }
 const take=free.slice(0,remaining);  // OC: take its available units, up to what's needed
 if(!take.length)return toastN('📦 '+code+' — no available units (already used / sold)');
 return commitCartonSerials(o,l,take,code,'Outer carton');
}
function toastN(m){toast(m,'var(--amber)');return 0;}
function commitCartonSerials(o,l,serials,code,label){
 let added=0;
 for(const s of serials){if(l.serials.length>=l.qty)break;usedSerials.add(s);l.serials.push(s);added++;}
 if(added&&o.status==='CREDIT_OK')o.status='PICKING';
 updateLineDom(o,l);refreshSerialChrome(o);renderNav();renderStats();renderFilters();renderQueue();renderCityMenu();
 if(added)toast('📦 '+label+' '+code+' → +'+added+' '+l.name+(l.serials.length>=l.qty?' · line complete':''),'var(--green)');
 const nxt=o.lines.find(x=>x.serials.length<x.qty);if(nxt)focusLine(nxt.sku);
 return added;
}
// Demo helpers: an intact MC that fits the line, and a couple of OCs with free units.
function sampleMc(l){if(!DEMO_MODE)return null;const rem=l.qty-l.serials.length;if(rem<=0)return null;
 return Object.keys(AGG).find(c=>{const n=AGG[c];return n.type==='mc'&&n.sku===l.sku&&n.serials.length<=rem&&n.serials.every(s=>(ZOHO_POOL[l.sku]||[]).includes(s)&&!usedSerials.has(s));})||null;}
function sampleOcs(l){if(!DEMO_MODE)return [];const out=[];for(const c of Object.keys(AGG)){const n=AGG[c];if(n.type==='oc'&&n.sku===l.sku&&n.serials.some(s=>!usedSerials.has(s))){out.push(c);if(out.length>=2)break;}}return out;}
async function ingestScan(orderId,value,focusSku){
 const val=normalizeScan(value).toUpperCase();if(!val)return 0;
 const kind=classifyCode(val);
 if(kind==='mc'||kind==='oc'){const node=await aggResolve(val);if(!node){toast('Unknown carton — not in the aggregation map: '+val,'var(--amber)');return 0;}return captureCarton(orderId,node,val);}
 if(kind.endsWith('_bad')){toast('Check digit failed — re-scan the label','var(--red)');return 0;}
 if(kind!=='primary'){toast('Unrecognized code — not an ERONIX serial','var(--amber)');return 0;}
 const o=orders.find(x=>x.id===orderId);let sku=focusSku;        // primary S/N → route to its line
 const owner=o.lines.find(l=>{const p=poolForLine(l);return p&&(p.includes?p.includes(val):p.has(val));});
 if(owner)sku=owner.sku; else if(!sku){const f=o.lines.find(l=>l.serials.length<l.qty);if(f)sku=f.sku;}
 return addSerialValue(orderId,sku,val)?1:0;
}
async function ingestScanCam(raw){

 if(added>0){beep();flashHit();pushRecent(added>1?('📦 +'+added):raw);}
 const nxt=camOrder.lines.find(l=>l.serials.length<l.qty);
 if(!nxt){toast('All '+unitCount(camOrder)+' serials captured','var(--green)');closeCamera();return;}
 camSku=nxt.sku;camTargetLabel();
}
async function preloadPool(o){
 if(DEMO_MODE)return;
 const ids=[...new Set(o.lines.map(l=>l.itemId).filter(Boolean))];if(!ids.length)return;
 try{const r=await fetch('/.netlify/functions/serial-pool?items='+encodeURIComponent(ids.join(',')),{credentials:'include'});const j=await r.json();
  Object.entries(j.pools||{}).forEach(([id,arr])=>{zohoPool[id]=new Set(arr||[]);});if(selectedId===o.id)renderDrawer();}catch(e){}
}

function makeOrder(city,status){
 const dealer=pick(DEALERS[city]),n=rnd(1,3),lines=[],used=new Set();
 for(let i=0;i<n;i++){let p;do{p=pick(CATALOG)}while(used.has(p.sku));used.add(p.sku);lines.push({sku:p.sku,name:p.name,price:p.price,loc:p.loc,qty:rnd(2,12),serials:[]});}
 const subtotal=lines.reduce((s,l)=>s+l.price*l.qty,0),gst=Math.round(subtotal*.18),mins=rnd(4,600);
 const source=Math.random()<0.34?'dealer':'unolo';
 const exec=source==='dealer'?'':pick(EXECS[city]);
 const placedBy=source==='dealer'?dealer.name+' · Dealer OS':exec;
 const _st=status||'NEW',_ca=Date.now()-mins*60000;
 return{id:(source==='dealer'?'ERX-D-':'ERX-')+(++seq),unoloId:'UNL-'+rnd(80000,99999),city,dealer,exec,source,placedBy,lines,subtotal,gst,total:subtotal+gst,status:_st,createdAt:_ca,stamps:demoStamps(_st,_ca),invoiceNo:null,courier:null,awb:null,holdReason:null};
}
function fillSerials(o){o.lines.forEach(l=>{l.serials=[];for(let i=0;i<l.qty;i++){const s=poolPick(l.sku,new Set(l.serials));usedSerials.add(s);l.serials.push(s);}});}
function seed(){
 orders=[];usedSerials.clear();
 Object.keys(CITIES).forEach(city=>{
  const dist=['NEW','NEW','NEW','HELD','CREDIT_OK','CREDIT_OK','PICKING','SERIALIZED','INVOICED','DISPATCHED','DELIVERED'];
  dist.forEach(s=>{
   const o=makeOrder(city,s);
   if(s==='HELD'){o.holdReason='Dues past credit period + grace — unsettled invoices';o.creditHold=true;}
   if(s==='PICKING'){ // partially serialized
     const l=o.lines[0];const k=Math.max(1,Math.floor(l.qty/2));for(let i=0;i<k;i++){const sn=poolPick(l.sku,new Set(l.serials));usedSerials.add(sn);l.serials.push(sn);}
   }
   if(['SERIALIZED','INVOICED','DISPATCHED','DELIVERED'].includes(s))fillSerials(o);
   if(['INVOICED','DISPATCHED','DELIVERED'].includes(s))o.invoiceNo='INV/26/'+rnd(4000,4999);
   if(['DISPATCHED','DELIVERED'].includes(s)){o.courier=pick(['Delhivery','BlueDart','DTDC']);o.awb=rnd(100000000,999999999);}
   orders.push(o);
  });
 });
}
seed();

function creditFor(o){
 const projected=o.dealer.outstanding+o.total,ratio=projected/o.dealer.limit;
 let level='ok',msg='Within credit limit — clear to approve.';
 if(ratio>1){level='bad';msg='Exceeds credit limit by '+fmt(projected-o.dealer.limit)+'. Hold or collect part-payment.';}
 else if(ratio>.85){level='warn';msg='Approaching limit ('+Math.round(ratio*100)+'% utilised). Review before approving.';}
 return{projected,ratio,level,msg};
}
const ACC_STATES=['NEW','ACCOUNTS_REVIEW','HELD','SERIALIZED'], WH_STATES=['CREDIT_OK','PICKING','SERIALIZED','INVOICED','DISPATCHED','DELIVERED'];
function roleStates(){return ROLE==='accounts'?ACC_STATES:WH_STATES}
function cityOrders(){return orders.filter(o=>o.city===CITY)}
function serialCount(o){return o.lines.reduce((s,l)=>s+l.serials.length,0)}
function unitCount(o){return o.lines.reduce((s,l)=>s+l.qty,0)}
function fullySerialized(o){return o.lines.every(l=>l.serials.length===l.qty)}
function visible(){
 let p=cityOrders().filter(o=>roleStates().includes(o.status));
 if(FILTER!=='all'){
  if(FILTER==='new')p=p.filter(o=>['NEW','ACCOUNTS_REVIEW'].includes(o.status));
  else if(FILTER==='hold')p=p.filter(o=>o.status==='HELD');
  else if(FILTER==='toinvoice')p=p.filter(o=>o.status==='SERIALIZED');
  else if(FILTER==='topick')p=p.filter(o=>['CREDIT_OK','PICKING'].includes(o.status));
  else if(FILTER==='awaiting')p=p.filter(o=>o.status==='SERIALIZED');
  else if(FILTER==='todispatch')p=p.filter(o=>o.status==='INVOICED');
  else if(FILTER==='shipped')p=p.filter(o=>['DISPATCHED','DELIVERED'].includes(o.status));
 }
 return p.sort((a,b)=>a.createdAt-b.createdAt);
}
function ageStr(ts){const m=Math.round((Date.now()-ts)/60000);if(m<60)return m+'m ago';const h=Math.round(m/60);if(h<24)return h+'h ago';return Math.round(h/24)+'d ago';}

function countBy(k){
 const co=cityOrders();
 const f={all:o=>roleStates().includes(o.status),new:o=>['NEW','ACCOUNTS_REVIEW'].includes(o.status),hold:o=>o.status==='HELD',
  toinvoice:o=>o.status==='SERIALIZED',topick:o=>['CREDIT_OK','PICKING'].includes(o.status),awaiting:o=>o.status==='SERIALIZED',
  todispatch:o=>o.status==='INVOICED',shipped:o=>['DISPATCHED','DELIVERED'].includes(o.status)};
 return co.filter(f[k]).length;
}

function fmtStamp(ts){const d=new Date(ts);if(isNaN(d))return '';return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true});}
function demoStamps(status,createdAt){const so=['NEW','HELD','CREDIT_OK','PICKING','SERIALIZED','INVOICED','DISPATCHED','DELIVERED'],mile=['NEW','CREDIT_OK','SERIALIZED','INVOICED','DISPATCHED','DELIVERED'];const reached=mile.filter(k=>so.indexOf(status)>=so.indexOf(k));const span=Math.max(0,Date.now()-createdAt),st={};reached.forEach((k,i)=>{st[k]=Math.round(createdAt+span*(reached.length>1?i/(reached.length-1):0));});return st;}
function timeline(o){
 const stOrder=['NEW','HELD','CREDIT_OK','PICKING','SERIALIZED','INVOICED','DISPATCHED','DELIVERED'];
 const at=k=>stOrder.indexOf(o.status)>=stOrder.indexOf(k);
 const steps=[
  {t:o.source==='dealer'?'Placed via Dealer OS':'Booked in Unolo',s:'by '+(o.placedBy||o.exec),done:true,k:'NEW'},
  {t:'Credit cleared by accounts',s:'',done:at('CREDIT_OK'),k:'CREDIT_OK'},
  {t:'Serial numbers captured',s:serialCount(o)+' / '+unitCount(o)+' units · '+CITIES[o.city].wh,done:at('SERIALIZED'),k:'SERIALIZED'},
  {t:'Invoice raised by accounts',s:o.invoiceNo?('Invoice '+o.invoiceNo+' · serials attached'):'awaiting serials',done:at('INVOICED'),k:'INVOICED'},
  {t:'Dispatched',s:o.courier?(o.courier+' · '+o.awb):'pending',done:at('DISPATCHED'),k:'DISPATCHED'},
  {t:'Delivered',s:'to dealer',done:o.status==='DELIVERED',k:'DELIVERED'},
 ];
 return `<div class="block"><h3>Progress</h3><div class="timeline">${steps.map(s=>{const _ts=s.done?((o.stamps&&o.stamps[s.k])||(s.k==='NEW'?o.createdAt:s.k==='DELIVERED'?o.deliveredAt:null)):null;return `<div class="tl ${s.done?'done':'pending'}"><div class="dot">${s.done?'<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#04210d" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>':''}</div><div class="t">${s.t}</div>${s.s?`<div class="s">${s.s}</div>`:''}${_ts?`<div class="tlts">${fmtStamp(_ts)}</div>`:''}</div>`;}).join('')}</div></div>`;
}

function updateLineDom(o,l){
 const prog=document.getElementById('prog-'+l.sku),bar=document.getElementById('bar-'+l.sku),chips=document.getElementById('chips-'+l.sku),scanrow=document.getElementById('scanrow-'+l.sku);

 if(prog){prog.textContent=l.serials.length+' / '+l.qty;prog.classList.toggle('done',ld);}
 if(bar){const i=bar.firstElementChild;i.style.width=pct+'%';i.classList.toggle('done',ld);}
 if(chips)chips.innerHTML=l.serials.map((s,i)=>`<span class="serchip"><span class="n">${i+1}</span>${s}<span class="x" onclick="removeSerial('${o.id}','${l.sku}',${i})">✕</span></span>`).join('');

function refreshSerialChrome(o){

function focusLine(sku){const i=document.getElementById('scan-'+sku);if(i){i.focus();i.scrollIntoView({block:'center',behavior:'smooth'});}}
// Core add — surgical DOM update only; never tears down the active input.
function addSerialValue(id,sku,val){
 const o=orders.find(x=>x.id===id),l=o.lines.find(x=>x.sku===sku);
 if(l.serials.length>=l.qty){toast('This SKU is already fully serialized','var(--amber)');return false;}
 if(usedSerials.has(val)||o.lines.some(x=>x.serials.includes(val))){toast('Duplicate serial — already scanned','var(--red)');return false;}
 if(strictZoho()&&inZohoPool(l,val)===false){toast('✗ Not in Zoho in-stock for this SKU','var(--red)');return false;}
 usedSerials.add(val);l.serials.push(val);
 if(o.status==='CREDIT_OK')o.status='PICKING';
 updateLineDom(o,l);refreshSerialChrome(o);
 renderNav();renderStats();renderFilters();renderQueue();renderCityMenu();
 if(l.serials.length===l.qty){const nxt=o.lines.find(x=>x.serials.length<x.qty);if(nxt)focusLine(nxt.sku);} else focusLine(sku);
 return true;
}
function commitScan(id,sku,el){const val=el.value;el.value='';el._fast=0;if(!normalizeScan(val))return;ingestScan(id,val,sku);}
// Code 128 payload arrives already checksum-verified by the scanner. We classify
// by the ERONIX scheme and validate the embedded GS1 check digit.
const SERIAL_RE=PRIMARY_RE; // primary serials only
function normalizeScan(raw){return raw.replace(/[\x00-\x1F\x7F]/g,'').trim();}
function validSerial(s){if(!s)return{ok:false,why:'Empty scan'};const k=classifyCode(s);
 if(k==='primary')return{ok:true};
 if(k==='primary_bad')return{ok:false,why:'Check digit failed — possible mis-scan'};
 if(k.startsWith('mc')||k.startsWith('oc'))return{ok:false,why:'That is a carton label, not a unit serial'};
 return{ok:false,why:'Unrecognized serial format'};}
// Enter/Tab commit immediately; track inter-key speed to detect a scanner burst.
function onScanKey(e,id,sku){const el=e.target,now=performance.now(),gap=now-(el._last||0);el._last=now;el._fast=gap<35?(el._fast||0)+1:0;if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();commitScan(id,sku,el);}}
// Fallback for no-suffix scanners: commit on idle after a fast burst.
function onScanInput(e,id,sku){const el=e.target;clearTimeout(el._idle);el._idle=setTimeout(()=>{if(el.value.trim()&&(el._fast||0)>=3)commitScan(id,sku,el);},110);}
function removeSerial(id,sku,i){
 const o=orders.find(x=>x.id===id),l=o.lines.find(x=>x.sku===sku);
 usedSerials.delete(l.serials[i]);l.serials.splice(i,1);
 updateLineDom(o,l);refreshSerialChrome(o);renderNav();renderStats();renderFilters();renderQueue();renderCityMenu();focusLine(sku);
}
function autofillLine(id,sku){
 const o=orders.find(x=>x.id===id),l=o.lines.find(x=>x.sku===sku);
 while(l.serials.length<l.qty){const s=poolPick(l.sku,new Set(l.serials));usedSerials.add(s);l.serials.push(s);}
 if(o.status==='CREDIT_OK')o.status='PICKING';
 updateLineDom(o,l);refreshSerialChrome(o);renderNav();renderStats();renderFilters();renderQueue();renderCityMenu();
 const nxt=o.lines.find(x=>x.serials.length<x.qty);if(nxt)focusLine(nxt.sku);
}
// Sealed-carton / manual fallback: expand a contiguous run from the first S/N and
// route every unit through the SAME validation as a scan. If the carton isn't
// actually contiguous, the first absent unit is rejected and the picker scans it.
async function rangeFill(id,sku){
 const o=orders.find(x=>x.id===id),l=o.lines.find(x=>x.sku===sku);
 const start=normalizeScan(document.getElementById('rfstart-'+sku).value).toUpperCase();
 if(classifyCode(start)!=='primary'){toast('Enter a valid first serial number to fill from','var(--amber)');return;}
 const need=l.qty-l.serials.length;if(need<=0){toast(l.name+' is already complete','var(--amber)');return;}
 const run=expandRangeCodes(start,need);
 if(!run.length){toast('Could not expand that range — check the first serial','var(--amber)');return;}
 let added=0;
 for(const s of run){
  const r=await ingestScan(id,s,sku);
  if(r>0){added++;continue;}
  toast('Stopped at '+s+' — not in stock here. Scan that unit manually.','var(--amber)');break;
 }
 if(added)toast('Range fill → +'+added+' '+l.name+' · each verified against stock','var(--green)');
 document.getElementById('rfstart-'+sku).value='';
}
function submitSerials(id){
 const o=orders.find(x=>x.id===id);if(!fullySerialized(o)){toast('Capture every serial first','var(--amber)');return;}
 o.status='SERIALIZED';
 if(!DEMO_MODE)(async()=>{for(const l of o.lines)await apiAction(id,'serialize',{sku:l.sku,serials:l.serials});await apiAction(id,'submitSerials');})().catch(e=>toast('Sync failed — '+e.message,'var(--red)'));
 toast('Serials relayed to accounts for invoicing','var(--yellow)');closeDrawer();refresh();
}

/* ---- camera scanner (3rd capture method, production) ----
   Android/Chromium: native BarcodeDetector (verified to list code_128).
   iOS/Safari (no Barcode Detection API): self-hosted ZXing-WASM fallback.
   Locked to Code 128. Decodes the FULL (downscaled) frame so what you aim at on
   screen is what gets decoded — the reticle is only an aiming guide. Feeds the
   same addSerialValue() path + dedup + gate. Swap seam = detectFrame(). */
const WASM_BASE=new URL('vendor/zxing/',document.baseURI).href;   // works at root or subpath
const BUILD='v16';                                                 // shown in the HUD to confirm you're on the new build
let camOrder=null,camSku=null,camStream=null,camTrack=null,camTimer=null,camBD=null,camZX=null,camEngine=null,camCool={},camStop=false,framesSeen=0,camHudT=null,camLastVal=null;
const camEl=id=>document.getElementById(id);
function camStatus(t,kind){const el=camEl('camStatus');if(!el)return;el.textContent=t;el.className='camstatus'+(kind?' '+kind:'');}
async function getZXing(){
 if(camZX)return camZX;
 const m=await import(WASM_BASE+'es/reader/index.js');
 m.setZXingModuleOverrides({locateFile:(p)=>p.endsWith('.wasm')?WASM_BASE+'zxing_reader.wasm':p});
 camZX=m;return m;
}
const WANT_BD=['code_128','code_39','code_93'];
const ACCEPT_FMT=new Set(['code128','code39','code93']); // serial-style linear; excludes numeric retail EAN/UPC
const normFmt=f=>String(f||'').toLowerCase().replace(/[^a-z0-9]/g,'');
let camSeen=null;
async function detectInit(){
 // Decide the engine once, up front, so load failures surface immediately.
 let bdOK=false,sup=[];
 try{if('BarcodeDetector' in window){sup=await BarcodeDetector.getSupportedFormats();bdOK=sup.includes('code_128');}}catch(e){}
 if(bdOK){camEngine='native';const use=WANT_BD.filter(f=>sup.includes(f));camBD=new BarcodeDetector({formats:use.length?use:['code_128']});return;}
 camEngine='wasm';
 const z=await getZXing();                       // throws → caught in openCamera
 await z.readBarcodes({data:new Uint8ClampedArray(4),width:1,height:1},{formats:['Code128']}).catch(()=>{}); // warm the wasm
}
async function detectFrame(canvas){
 if(camEngine==='native'){try{const r=await camBD.detect(canvas);return r.map(c=>({text:c.rawValue,format:c.format}));}catch(e){return [];}}
 try{const ctx=canvas.getContext('2d');const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const res=await camZX.readBarcodes(img,{formats:['Code128','Code39','Code93'],maxNumberOfSymbols:8,tryHarder:true,tryRotate:true});
  return res.map(x=>({text:x.text,format:x.format}));}catch(e){return [];}
}
function camMsg(t){camEl('camMsgText').textContent=t;camEl('camMsg').classList.add('show');}
function camTargetLabel(){const o=camOrder,l=o.lines.find(x=>x.sku===camSku);if(!l)return;
 camEl('camTarget').innerHTML=l.name+'<small>'+l.sku+' · Bin '+l.loc+'</small>';
 camEl('camCnt').textContent=l.serials.length+' / '+l.qty;}
function beep(){try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=1320;g.gain.value=.07;o.start();setTimeout(()=>{o.stop();a.close();},90);}catch(e){}if(navigator.vibrate)navigator.vibrate(40);}
function flashHit(){const r=camEl('camRetic');r.classList.add('hit');setTimeout(()=>r.classList.remove('hit'),260);}
function pushRecent(s){const el=camEl('camRecent');const c=document.createElement('span');c.className='rc';c.textContent='✓ '+s;el.prepend(c);while(el.children.length>4)el.lastChild.remove();}

async function openCamera(id){
 const o=orders.find(x=>x.id===id);if(!o)return;camOrder=o;
 const first=o.lines.find(l=>l.serials.length<l.qty);
 if(!first){toast('All units already serialized','var(--green)');return;}
 camSku=first.sku;camStop=false;framesSeen=0;
 camEl('camMsg').classList.remove('show');camEl('cam').classList.add('open');camTargetLabel();
 camEl('camManual').value='';
 if(!window.isSecureContext){camStatus('Needs HTTPS',' err');camMsg('The camera only works over HTTPS. Open the deployed site on the phone — not this preview frame. You can still type serials below.');return;}
 if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){camStatus('No camera API',' err');camMsg('This browser exposes no camera API. Use the hardware scanner or type serials below.');return;}
 camStatus('Requesting camera…');
 let v;
 try{
  camStream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}});
 }catch(e){
  const n=e&&e.name||'';
  camStatus('Camera blocked',' err');
  camMsg(n==='NotAllowedError'?'Camera permission was denied. Enable it for this site in your browser/Settings, then reopen. You can type serials below meanwhile.'
        :n==='NotFoundError'?'No camera found on this device. Use the hardware scanner or type serials below.'
        :'Could not start the camera ('+(n||'error')+'). Type serials below, or use the hardware scanner.');
  return;
 }
 v=camEl('camVideo');v.srcObject=camStream;v.muted=true;v.playsInline=true;v.setAttribute('playsinline','');
 try{ await v.play(); }
 catch(e){
  // iOS sometimes needs a second user tap to start playback.
  camStatus('Tap the screen to start',' err');
  const kick=async()=>{try{await v.play();camEl('cam').removeEventListener('click',kick);startScanning(v);}catch(_){}};
  camEl('cam').addEventListener('click',kick);
  return;
 }
 startScanning(v);
}
async function startScanning(v){
 camTrack=camStream.getVideoTracks()[0];
 try{await camTrack.applyConstraints({advanced:[{focusMode:'continuous'}]});}catch(e){}
 const cap=camTrack.getCapabilities?camTrack.getCapabilities():{};camEl('camTorch').style.display=cap.torch?'flex':'none';

 try{ await detectInit(); }
 catch(e){ camStatus('Engine failed',' err'); camMsg('The scan engine failed to load ('+(e&&e.message||e)+'). Confirm /vendor/zxing is deployed. You can type serials below.'); return; }
 loopScan(v);
 hud();

 setTimeout(()=>{ if(!camStop && framesSeen===0) camStatus('No camera frames — tap to retry',' err'); },3000);
}
function hud(){
 if(camStop)return;
 const last=camLastVal?('…'+String(camLastVal).slice(-5)):'none';
 camStatus(BUILD+'·'+camEngine+'·'+framesSeen+'f · seen:'+(camSeen||'none')+' · last:'+last,'ok');
 camHudT=setTimeout(hud,400);
}
function loopScan(v){
 const work=document.createElement('canvas');const wctx=work.getContext('2d',{willReadFrequently:true});
 const dbg=camEl('camDebug');const dctx=dbg?dbg.getContext('2d'):null;
 const tick=async()=>{
  if(camStop||!camStream)return;
  if(v.videoWidth && v.readyState>=2){
   // High-res CENTER CROP (the band you aim at) — many more pixels per bar than a downscaled full frame.
   const vw=v.videoWidth,vh=v.videoHeight;
   const cw=Math.round(vw*0.92),ch=Math.round(vh*0.5),sx=Math.round((vw-cw)/2),sy=Math.round((vh-ch)/2);
   const long=Math.max(cw,ch),scale=Math.min(1,1600/long);
   const w=Math.round(cw*scale),h=Math.round(ch*scale);
   work.width=w;work.height=h;wctx.drawImage(v,sx,sy,cw,ch,0,0,w,h);
   framesSeen++;
   if(dctx){dbg.width=120;dbg.height=Math.round(120*h/w);dctx.drawImage(work,0,0,dbg.width,dbg.height);} // shows EXACTLY what the decoder sees
   const detected=await detectFrame(work);
   for(const d of detected){
    camSeen=normFmt(d.format).replace('code','c')+'·'+String(d.text).slice(-5); // e.g. c128·A492
    if(ACCEPT_FMT.has(normFmt(d.format))) handleScan(d.text);
   }
  }
  camTimer=setTimeout(tick, camEngine==='wasm'?170:80);
 };tick();
}
function commitCamSerial(val){
 camLastVal=val;
 const line=camOrder.lines.find(l=>l.sku===camSku);const before=line.serials.length;
 if(!addSerialValue(camOrder.id,camSku,val))return;
 if(line.serials.length>before){beep();flashHit();pushRecent(val);}
 if(line.serials.length>=line.qty){const nxt=camOrder.lines.find(x=>x.serials.length<x.qty);
  if(nxt){camSku=nxt.sku;camTargetLabel();}else{toast('All '+unitCount(camOrder)+' serials captured','var(--green)');closeCamera();return;}
 } else camTargetLabel();
}
function handleScan(raw){
 const val=normalizeScan(raw);if(!val)return;
 if(camCool[val]&&Date.now()-camCool[val]<1500)return;camCool[val]=Date.now();
 ingestScanCam(val);
}
function camManualAdd(){
 const inp=camEl('camManual');const val=normalizeScan(inp.value);inp.value='';
 if(!val)return;
 if(camCool[val]&&Date.now()-camCool[val]<1500){inp.focus();return;}camCool[val]=Date.now();
 ingestScanCam(val);inp.focus();
}
function toggleTorch(){if(!camTrack)return;const btn=camEl('camTorch');const on=!btn.classList.contains('on');
 camTrack.applyConstraints({advanced:[{torch:on}]}).then(()=>btn.classList.toggle('on',on)).catch(()=>{});}
function closeCamera(){
 camStop=true;
 if(camTimer){clearTimeout(camTimer);camTimer=null;}
 if(camHudT){clearTimeout(camHudT);camHudT=null;}
 if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
 camTrack=null;camCool={};camEl('camRecent').innerHTML='';
 camEl('cam').classList.remove('open');
 if(selectedId)renderDrawer();
}
document.addEventListener('visibilitychange',()=>{if(document.hidden&&camStream)closeCamera();});
window.addEventListener('pagehide',()=>{if(camStream)closeCamera();});

/* ---- staff login (production only; demo skips it) ---- */
let SESSION=null,loginEmail='';
function lerr(t){document.getElementById('loginError').textContent=t||'';}
function showLogin(){document.getElementById('login').classList.add('show');setTimeout(()=>document.getElementById('loginEmail').focus(),60);}
function hideLogin(){document.getElementById('login').classList.remove('show');}
function backToEmail(){document.getElementById('loginStep2').style.display='none';document.getElementById('loginStep1').style.display='block';lerr('');}
async function requestOtp(){
 const email=document.getElementById('loginEmail').value.trim();
 if(!email){lerr('Enter your work email');return;}
 loginEmail=email;const b=document.getElementById('loginSendBtn');b.disabled=true;lerr('');
 if(DEMO_MODE){document.getElementById('loginEmailEcho').textContent=email;document.getElementById('loginStep1').style.display='none';document.getElementById('loginStep2').style.display='block';setTimeout(()=>document.getElementById('loginCode').focus(),60);return;}
 try{await fetch('/.netlify/functions/auth-request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});}catch(e){}
 b.disabled=false;
 document.getElementById('loginEmailEcho').textContent=email;
 document.getElementById('loginStep1').style.display='none';
 document.getElementById('loginStep2').style.display='block';
 setTimeout(()=>document.getElementById('loginCode').focus(),60);
}
async function verifyOtp(){
 const code=document.getElementById('loginCode').value.trim();
 if(code.length<6){lerr('Enter the 6-digit code');return;}
 if(DEMO_MODE){const role=document.getElementById('demoRole').value,city=document.getElementById('demoCity').value;hideLogin();applySession({name:(role==='warehouse'?'Warehouse':'Accounts')+' (demo)',role,city,email:loginEmail});return;}
 const b=document.getElementById('loginVerifyBtn');b.disabled=true;lerr('');
 try{
  const r=await fetch('/.netlify/functions/auth-verify',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:loginEmail,code})});
  if(!r.ok){lerr(await r.text()||'Sign-in failed');b.disabled=false;return;}
  const j=await r.json();hideLogin();applySession(j.session);
 }catch(e){lerr('Network error — try again');b.disabled=false;}
}
function applySession(s){
 SESSION=s;ROLE=s.role;CITY=s.city;FILTER='all';
 document.getElementById('cityLabel').textContent=s.city;
 document.getElementById('whoAv').classList.toggle('wh',s.role==='warehouse');
 document.body.classList.add('prod');           // hide role switch + lock city
 identity();refresh();if(!DEMO_MODE)reloadFromServer();
}
async function doLogout(){
 if(DEMO_MODE){if(DEMO_LOGIN){document.body.classList.remove('prod');backToEmail();document.getElementById('loginCode').value='';showLogin();}else{toast('Sign-out is disabled in demo','var(--label3)');}return;}
 try{await fetch('/.netlify/functions/auth-logout',{method:'POST',credentials:'include'});}catch(e){}
 location.reload();
}

/* ---- boot + PWA ---- */
function boot(){
 if(DEMO_MODE){identity();refresh();if(DEMO_LOGIN){document.getElementById('loginDemo').style.display='block';showLogin();}return;}
 fetch('/.netlify/functions/auth-me',{credentials:'include'})
  .then(r=>{if(r.ok)return r.json();throw 0;})
  .then(s=>applySession(s))
  .catch(()=>{identity();refresh();showLogin();});
}
boot();
if('serviceWorker' in navigator && location.protocol==='https:'){
 window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
